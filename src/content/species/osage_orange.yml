name: Osage Orange
also_known_as:
- Bois d'Arc
- Bodark
- Hedge Apple
- Bow-wood
scientific: Maclura pomifera
origin: South-central United States (Texas, Oklahoma, Arkansas, Missouri; now widely planted across North America)
appearance:
  heartwood: Bright golden yellow to orange when freshly cut; darkens to a medium brown over time with UV and air exposure
  sapwood: Narrow band, light yellowish white; clearly demarcated from heartwood
  grain: Straight; ring-porous with distinct growth rings. Pores completely filled with tyloses and extractives.
  texture: Medium to fine
  luster: Natural lustre present
properties:
  janka: 2620
  density: 0.86 sg (exceptionally dense; ~54 lbs/ft³ — one of the heaviest domestic North American hardwoods)
  workability: Difficult due to extreme hardness and density, though reportedly has little dulling effect on cutting edges. Pre-drilling recommended for screws and nails. Dust and sap can cause dermatitis.
  turning: Turns exceptionally well; can be sanded through fine grits to achieve a mirror-like finish before any topcoat
  gluing: Glues well with standard adhesives
  finishing: Takes stains nicely; finishes well with lacquer. Water-based finishes recommended as first coat to preserve the yellow colour longer. UV-blocking finishes can slow (but not prevent) the colour change.
uses:
- Archery bows (traditional Native American use — "bois d'arc" means "bow wood")
- Fence posts & outdoor structures (exceptional decay resistance; posts last 20+ years)
- Tool handles
- Turned objects & craft items
- Cutting boards & kitchenware
- Musical instruments (woodwind instruments, waterfowl calls)
advantages:
- Among the most decay-resistant and rot-resistant hardwoods in North America — outstanding for outdoor/ground-contact use
- Exceptional hardness and strength (Janka 2,620 lbf)
- Turns beautifully, producing a mirror-like finish off the lathe
- Striking golden-yellow colour when freshly milled
- Domestically grown and sustainable — not CITES or IUCN listed
challenges:
- Extreme density makes it difficult to machine; sharp tools and patience required
- Colour changes significantly over time from bright yellow to medium brown
- Sap and dust can cause skin irritation and dermatitis
- Limited commercial availability — trees are typically small and gnarly, yielding few saw-quality logs
- Must be dried slowly to avoid checking; end-coating and shed drying before kiln drying recommended
finishing_tips:
- Apply a water-based finish as the first coat to help lock in the yellow colour longer before UV darkening
- Use a UV-blocking topcoat (marine-grade varnish or deck sealer) to slow the inevitable colour shift
- Avoid oil-based finishes as a first coat if you want to preserve the bright yellow
- Sands beautifully through progressively finer grits; for turned pieces, work up through the grits for a near-mirror surface
buying_tips:
- Expect specialty pricing (~$4–5/bf) due to limited availability
- Look for kiln-dried stock at 6–8% moisture content for stability
- Wide, clear boards are rare and command premiums; turning blanks and smaller pieces are more readily available
- Consider Argentine Osage Orange (Maclura tinctoria) as an alternative — available in larger sizes with fewer knots
fun_fact: The wood was so prized by the Osage Nation for bow-making that, according to Meriwether Lewis, they would "travel many
  hundreds of miles in quest of it." Before the invention of barbed wire in the 1870s, American settlers planted an estimated
  60,000 miles of Osage Orange hedgerows as living fences — the thorny trees were the frontier's primary fencing solution.
comparisons:
- title: Osage Orange vs Black Locust
  rows:
  - Property: Janka Hardness
    Osage Orange: 2,620 lbf
    Black Locust: 1,700 lbf
  - Property: Density
    Osage Orange: Exceptionally dense (~54 lbs/ft³)
    Black Locust: Dense (~44 lbs/ft³)
  - Property: Colour
    Osage Orange: Golden yellow, darkens to brown
    Black Locust: Yellowish green to dark brown
  - Property: Decay Resistance
    Osage Orange: Exceptional
    Black Locust: Very good
  - Property: Availability
    Osage Orange: Specialty/limited
    Black Locust: More widely available
- title: Osage Orange Colour Change Over Time
  rows:
  - Stage: Freshly Cut
    Colour: Bright golden yellow
    Notes: Most vibrant; heartwood nearly glows
  - Stage: Early Exposure
    Colour: Deeper golden/orange
    Notes: Oxidation begins immediately upon air exposure
  - Stage: Moderate Aging
    Colour: Rich amber/orange-brown
    Notes: UV light accelerates the shift significantly
  - Stage: Fully Aged
    Colour: Medium to dark brown
    Notes: Final stable colour; UV finishes slow but cannot prevent this
faqs:
- q: Can you prevent Osage Orange from changing colour?
  a: No, the colour change from bright yellow to brown cannot be fully prevented. It is caused by oxidation and UV exposure.
    You can slow it significantly with water-based first coats and UV-blocking topcoats, but the shift will eventually occur.
- q: Is Osage Orange safe for cutting boards?
  a: Yes, Osage Orange is commonly used for cutting boards. The wood is extremely hard and resistant to moisture and decay.
    However, the sap and dust can cause dermatitis during woodworking, so wear appropriate protection while making the board.
- q: Is Osage Orange good firewood?
  a: Osage Orange is considered one of the best firewoods in North America. It produces up to 32.9 million BTUs per cord and
    burns hot and slow due to its extreme density. It does tend to throw sparks, so use a screen or closed stove.
