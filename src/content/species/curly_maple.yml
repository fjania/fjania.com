name: Curly Maple
also_known_as:
- Tiger Maple
- Fiddleback Maple
- Flamed Maple
- Ripple Maple
- Tiger Stripe Maple
scientific: Acer saccharum (figured)
origin: North America
appearance:
  heartwood: Pale cream to light golden brown with dramatic undulating curly figure across the face
  sapwood: Nearly white to pale cream; figure is visible in both heartwood and sapwood
  grain: Wavy, undulating fibres that produce distinctive rippled stripes perpendicular to the grain direction
  texture: Fine and even; smooth to the touch with subtle tactile ripples
  luster: Exceptional — the curly figure creates a three-dimensional chatoyant effect that shifts and shimmers as the viewing angle changes
properties:
  janka: 1450
  density: 0.63 sg (heavy and strong)
  workability: Harder to work than plain maple; figured grain is prone to tear-out during planing and routing — use light passes and sharp tooling
  turning: Excellent results on the lathe; the figure reveals itself beautifully in round forms
  gluing: Very good with standard wood glues; pre-drilling recommended for screws
  finishing: Outstanding — finish dramatically enhances the curly figure, bringing the three-dimensional chatoyance to life
uses:
- Fine furniture & accent pieces
- Violin backs, sides & guitar tops
- High-end cabinetry & architectural millwork
- Decorative veneers
- Gun stocks & knife handles
- Turned bowls & woodworking showpieces
advantages:
- Stunning three-dimensional optical figure
- Same hardness and durability as plain hard maple
- Finish transforms the wood into a shimmering showpiece
- Highly prized and collectible among woodworkers
- Versatile for both traditional and contemporary designs
challenges:
- Tear-out risk when planing or routing against the figure
- Requires consistently sharp tooling and light passes
- Can be difficult to stain evenly due to varying grain density
- Premium pricing compared to plain maple
- Board selection is critical — figure intensity varies widely
finishing_tips:
- Apply finish to reveal the full depth of the curl — raw wood only hints at the figure
- Oil finishes and clear coats both bring out dramatic chatoyance
- Use pre-stain conditioner if staining to prevent blotching
- Sand to 320+ grit for a glass-like surface that maximises figure depth
buying_tips:
- Inspect boards in person when possible — photos rarely capture the full figure
- Tilt boards under a light source to evaluate curl intensity and consistency
- Expect to pay a significant premium over plain hard maple
- FAS grade with strong figure commands the highest prices
fun_fact: Curly Maple earned the name "fiddleback" because Antonio Stradivari and other master luthiers
  prized it for the backs and sides of their violins — the same shimmering figure that catches a
  woodworker's eye also contributes to the instrument's legendary tone and visual beauty.
comparisons:
- title: Curly Maple vs Plain Hard Maple
  rows:
  - Property: Janka Hardness
    Curly Maple: 1,450 lbf
    Plain Hard Maple: 1,450 lbf
  - Property: Appearance
    Curly Maple: Shimmering 3D curly figure
    Plain Hard Maple: Subtle, uniform grain
  - Property: Workability
    Curly Maple: Tear-out risk from figure
    Plain Hard Maple: Straightforward
  - Property: Price
    Curly Maple: Significant premium
    Plain Hard Maple: Standard hardwood pricing
  - Property: Best For
    Curly Maple: Showpiece & accent work
    Plain Hard Maple: General cabinetry & utility
- title: Types of Maple Figure
  rows:
  - Property: Pattern
    Curly Maple: Rippled waves across the face
    Birdseye Maple: Small circular "eyes" scattered throughout
  - Property: Cause
    Curly Maple: Wavy fibre growth
    Birdseye Maple: Likely localised bud development
  - Property: Typical Species
    Curly Maple: Hard or soft maple
    Birdseye Maple: Almost exclusively hard maple
  - Property: Rarity
    Curly Maple: Uncommon but available
    Birdseye Maple: Rare
  - Property: Instrument Use
    Curly Maple: Violin backs & guitar tops
    Birdseye Maple: Decorative accents only
faqs:
- q: Is Curly Maple a separate species from Hard Maple?
  a: No — Curly Maple is not a distinct species. It is Hard Maple (or sometimes Soft Maple) with a naturally occurring wavy fibre growth pattern that produces the distinctive figure.
- q: Why does the figure only appear after finishing?
  a: The raw wood shows a subtle hint of curl, but applying a finish saturates the fibres and creates the refractive contrast between the wavy layers — dramatically revealing the three-dimensional chatoyance.
- q: How do I avoid tear-out when working Curly Maple?
  a: Use extremely sharp blades, take light passes, and consider climb-cutting on the router table. A card scraper is often the safest way to smooth figured surfaces without tear-out.
