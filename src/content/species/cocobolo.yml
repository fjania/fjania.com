name: Cocobolo
scientific: Dalbergia retusa
origin: Central America (Mexico, Nicaragua, Costa Rica, Panama)
appearance:
  heartwood: Ranges from golden yellow and orange to deep reddish-brown, with dramatic dark streaks of black and purple; colours deepen with age from bright orange when freshly cut to rich reddish-brown
  sapwood: Pale yellow, sharply demarcated from heartwood
  grain: Straight to interlocked; displays swirling patterns of dark multicoloured lines, with occasional spiderwebbing. Each piece is unique.
  texture: Fine and even
  luster: Naturally high lustre due to density and oil content; can be polished to a glass-like finish without applied coatings
properties:
  janka: 2960
  density: 1.10 sg (extremely heavy; sinks in water at ~69 lbs/ft³)
  workability: Responds well to machining despite extreme hardness. Carbide-tipped tools and slow cutting speeds recommended. Make shallow passes with cooling breaks to prevent heat discolouration.
  turning: Excellent turning wood; produces fine dust requiring respiratory protection. Takes a beautiful polish straight off the tool.
  gluing: Notoriously difficult due to high natural oil content; wipe surfaces with acetone immediately before applying slow-setting epoxy
  finishing: Sand progressively through fine grits (400–600). High oil content can interfere with film finishes — many woodworkers simply buff to a natural lustre or use friction polish. Lacquer works well after acetone wipe.
uses:
- Fine furniture & cabinetry
- Musical instruments (guitar backs/sides, clarinets, oboes)
- Knife handles, gun grips & tool handles
- Turned objects & decorative woodworking
- Jewellery boxes, chess pieces & pool cues
- Artisan carvings & sculptures
advantages:
- Stunning visual beauty — kaleidoscope of colours with unique grain patterns in every piece
- Exceptional hardness and durability — highly resistant to scratches, dents, and wear
- Natural rot and insect resistance — very durable without chemical treatment
- Superior acoustic properties — warm, full tone prized by luthiers
- Natural lustre without finish — oil content allows buffing to a glass-like shine with no applied coating
challenges:
- Severe allergenic potential — dust causes skin irritation, pink-eye, asthma-like symptoms, and nausea; respiratory protection mandatory
- Difficult gluing — natural oils resist adhesive bonding; requires acetone wiping and specialised epoxies
- Rapid tool dulling — extreme hardness wears down cutting edges quickly; carbide tooling recommended
- CITES-regulated and expensive — Appendix II since 2017; IUCN status Vulnerable; $50–$300+ per board foot
- Fairly brittle — requires pre-drilled holes before nailing or screwing to avoid splitting
finishing_tips:
- Sand progressively up to 400–600 grit to bring out natural lustre before applying any finish
- For film finishes (lacquer, shellac), wipe surfaces with acetone first to remove surface oils that inhibit adhesion
- Many turners skip applied finishes entirely, instead buffing with a cloth or friction polish for a natural glass-like sheen
- For furniture, apply paste wax annually to maintain the finish; light sanding and re-oiling restores dull surfaces
buying_tips:
- Verify legality — ensure the supplier provides CITES documentation; all Dalbergia species require export/import permits since 2017
- Expect colour variation — Nicaraguan stock tends toward vibrant reds and oranges, while Mexican timber leans darker chocolate/purple
- Buy slightly oversized — the wood is brittle and can crack during acclimation; extra material avoids costly shortfalls
- Purchase from specialised exotic-wood dealers rather than general lumber yards for better quality grading and proper documentation
fun_fact: Cocobolo trees grow in a famously crooked manner with many trunk imperfections — yet boards with abundant figuring and
  irregularity are actually more prized and valuable than straight-grained stock. Less than 2% of the original Central American
  dry forest where Cocobolo is endemic remains intact, making every piece a fragment of one of the world's most endangered
  ecosystems.
comparisons:
- title: Cocobolo vs Honduran Rosewood
  rows:
  - Property: Janka Hardness
    Cocobolo: 2,960 lbf
    Honduran Rosewood: 2,200 lbf
  - Property: Density
    Cocobolo: Extremely heavy (~69 lbs/ft³)
    Honduran Rosewood: Very heavy (~58 lbs/ft³)
  - Property: Colour
    Cocobolo: Multicoloured (orange, red, brown, purple with black streaks)
    Honduran Rosewood: Light to dark brown with black streaks
  - Property: Oil Content
    Cocobolo: Very high (complicates gluing/finishing)
    Honduran Rosewood: Moderate
  - Property: Acoustic Use
    Cocobolo: Guitar backs/sides, woodwinds
    Honduran Rosewood: Guitar backs/sides, xylophone bars
  - Property: Price
    Cocobolo: $50–$300+/bf
    Honduran Rosewood: $75–$400+/bf
- title: Cocobolo Colour Variation by Region
  rows:
  - Region: Nicaragua
    Colours: Vibrant reds, bright oranges, saturated yellows
    Character: Most colourful and commercially popular
  - Region: Mexico
    Colours: Deep chocolate browns, dark purples, muted reds
    Character: Darker, more subdued palette; denser on average
  - Region: Costa Rica / Panama
    Colours: Mid-range oranges and browns
    Character: Intermediate colouring; less commonly exported
faqs:
- q: Is Cocobolo safe to work with?
  a: It requires caution. Cocobolo dust is a potent sensitiser that can cause skin rashes, eye irritation, and asthma-like
    respiratory symptoms. Always use a respirator, ensure strong dust collection, and wear gloves when handling freshly cut
    stock. Some woodworkers develop sensitivity over time.
- q: Can I use regular wood glue (PVA) on Cocobolo?
  a: Standard PVA will almost certainly fail. The high natural oil content prevents proper adhesion. Wipe mating surfaces with
    acetone immediately before applying a slow-setting epoxy. Work quickly — oils begin migrating back to the surface within
    minutes.
- q: Is it legal to buy Cocobolo?
  a: Yes, but it is regulated. All Dalbergia species have been listed under CITES Appendix II since 2017, meaning international
    trade requires proper permits and documentation. Buy from reputable exotic-wood dealers who can provide chain-of-custody
    paperwork.
