name: Mahogany
also_known_as:
- Genuine Mahogany
- Honduras Mahogany
- Caoba
scientific: Swietenia macrophylla
origin: Central and South America (Mexico, Belize, Guatemala, Honduras, Brazil, Peru, Bolivia); now widely plantation-grown in tropical Asia and the Pacific
appearance:
  heartwood: Pale pinkish-brown when freshly cut, darkening to a rich reddish-brown to deep red-brown with age and light exposure
  sapwood: Yellowish-white to pale tan, clearly demarcated from heartwood
  grain: Straight to interlocked, sometimes wavy or irregular; quartersawn surfaces display a distinctive ribbon-stripe figure
  texture: Medium and uniform with moderate-sized open pores
  luster: High natural luster with notable chatoyancy — the surface shimmers and shifts in light depending on viewing angle
properties:
  janka: 900
  density: "0.52 sg (37 lbs/ft\xB3 dried)"
  workability: Excellent; one of the finest working hardwoods — machines, planes, and sands easily with hand and machine tools, though figured or interlocked grain may tear out if fed carelessly
  turning: Superb turning wood; holds fine detail, cuts cleanly, and produces a smooth lustrous surface straight off the tool
  gluing: Glues and bonds very well with standard wood adhesives; no special surface preparation needed
  finishing: Outstanding; accepts stains, oils, lacquers, and film finishes beautifully and evenly, producing a rich depth of colour
uses:
- Fine furniture and cabinetry
- Boat building (planking, decking, trim)
- Architectural millwork and interior panelling
- Musical instruments (guitar bodies, necks, drum shells)
- Decorative veneers and marquetry
- Carved objects and pattern making
advantages:
- Exceptional dimensional stability — resists warping, cupping, and seasonal movement better than nearly any other wood
- One of the easiest hardwoods to work with hand and machine tools
- Rich, warm colour that deepens beautifully with age
- Good natural resistance to rot, decay, and termites
- Takes all finishes superbly with even absorption and no blotching
challenges:
- Premium pricing due to CITES Appendix II trade restrictions (listed since 2003)
- Figured or interlocked grain can tear out during planing if feed angle is wrong
- Genuine Swietenia increasingly scarce; many substitutes are sold misleadingly as "mahogany"
- Sapwood is susceptible to powder-post beetle and borer attack
- Old-growth boards with tight grain and deep colour are becoming rare; plantation stock tends to be lighter and softer
finishing_tips:
- Sands easily through grits; finish at 220–320 for optimal smoothness
- Accepts stain evenly, but the natural colour is so attractive that a clear finish is often all that is needed
- Danish oil or tung oil brings out depth and chatoyancy; build up 3–4 coats for a hand-rubbed lustre
- For maximum colour preservation, use a UV-inhibiting topcoat such as marine spar varnish or UV-stabilised lacquer
buying_tips:
- Insist on "Genuine Mahogany" or Swietenia macrophylla — many species sold as "mahogany" (Khaya, Sapele, Meranti) are unrelated
- Expect to pay approximately $12–18+ per board foot depending on grade and figure
- Look for boards with a warm reddish-brown hue rather than pale pink — deeper colour usually indicates denser, higher-quality stock
- Check that the supplier provides proper CITES documentation for legally harvested or plantation-grown material
fun_fact: Genuine Mahogany was the wood of choice for Sir Thomas Chippendale, George Hepplewhite, and Thomas Sheraton —
  the three master furniture makers of 18th-century England — and is the species that defined the golden age of furniture
  making. It was so prized that the 1721 Naval Stores Act specifically exempted mahogany from import duties to encourage
  its use in British shipbuilding.
comparisons:
- title: Genuine Mahogany vs African Mahogany (Khaya)
  rows:
  - Property: Scientific Name
    Genuine Mahogany: Swietenia macrophylla
    African Mahogany: Khaya spp. (K. ivorensis, K. senegalensis, etc.)
  - Property: Janka Hardness
    Genuine Mahogany: 900 lbf
    African Mahogany: 1,070 lbf
  - Property: Density
    Genuine Mahogany: "0.52 sg (37 lbs/ft\xB3)"
    African Mahogany: "0.42\u20130.50 sg (31\u201340 lbs/ft\xB3)"
  - Property: Colour
    Genuine Mahogany: Warm reddish-brown with orange undertone
    African Mahogany: "Lighter pinkish-brown, less depth"
  - Property: Grain
    Genuine Mahogany: "Straight to interlocked, ribbon stripe on quartersawn"
    African Mahogany: "More interlocked, can be coarser"
  - Property: Dimensional Stability
    Genuine Mahogany: Exceptional — the gold standard
    African Mahogany: Good but not as stable
  - Property: Workability
    Genuine Mahogany: Excellent — machines and finishes superbly
    African Mahogany: "Good, but higher silica content dulls blades faster"
  - Property: Price
    Genuine Mahogany: Premium ($12\u201318+/bf)
    African Mahogany: Moderate ($6\u201310/bf)
- title: Mahogany Colour Over Time
  rows:
  - Stage: Freshly Milled
    Colour: Pale pinkish-brown to salmon
    Timeframe: Days
  - Stage: Early Aging
    Colour: Warm golden-brown with reddish tones
    Timeframe: 1\u20136 months
  - Stage: Mature
    Colour: Rich reddish-brown with depth and chatoyancy
    Timeframe: 1\u20133 years
  - Stage: Aged (unfinished)
