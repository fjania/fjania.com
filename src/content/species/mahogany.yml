    Timeframe: Decades
faqs:
- q: What is the difference between Genuine Mahogany and African Mahogany?
  a: Genuine Mahogany (Swietenia macrophylla) and African Mahogany (Khaya spp.) are in the same botanical family
    (Meliaceae) but are different genera. Genuine Mahogany has superior dimensional stability, a richer reddish-brown
    colour with more depth and chatoyancy, and better workability. African Mahogany is lighter in colour with a pinkish
    hue, has more interlocked grain, and costs roughly half as much.
- q: Is Genuine Mahogany endangered?
  a: Swietenia macrophylla has been listed on CITES Appendix II since 2003, meaning international trade is regulated
    but not banned. Wild populations have been severely reduced by centuries of logging. However, sustainable plantation
    mahogany is now grown widely in Fiji, Indonesia, India, and Central America, making legally sourced material
    available. Always verify CITES documentation when purchasing.
- q: Why is mahogany considered the best wood for furniture?
  a: Mahogany combines an unusually complete set of desirable properties — exceptional dimensional stability, easy
    workability with both hand and machine tools, beautiful grain that takes finish superbly, good rot resistance, and
    a rich warm colour that improves with age. No other single species matches it across all these criteria
    simultaneously, which is why it has been the benchmark furniture wood for over 300 years.
