name: Ambrosia Maple
also_known_as:
- Wormy Maple
scientific: Acer rubrum (beetle-figured)
origin: North America
appearance:
  heartwood: Light creamy beige with grey, brown & blue-green streaking
  sapwood: Creamy beige base colour
  grain: Linear or feathery streaks from beetle tunnels
  texture: Fine to medium; tiny bore holes throughout
  luster: Moderate natural sheen
properties:
  janka: 950
  density: 0.54 sg (moderate; typical of soft maple)
  workability: Cuts cleanly with sharp tools; tear-out possible around holes
  turning: Excellent — visual character shines on the lathe
  gluing: Excellent adhesion with standard wood glues
  finishing: Sands smoothly; fine grit maintains grain contrast
uses:
- Accent furniture & feature pieces
- Tabletops & dining tables
- Turned bowls & vessels
- Cutting boards
- Decorative conversation pieces
- Wall art & live edge projects
advantages:
- Unique, unrepeatable natural patterns
- Excellent workability
- Affordable compared to other figured woods
- Stunning visual character
- Great strength-to-beauty ratio
challenges:
- Variable figure — board selection is critical
- Small bore holes throughout the wood
- Tear-out risk around figured areas
- No two boards are alike (matching is difficult)
finishing_tips:
- Use fine-grit sandpaper to preserve contrast
- Matte finishes highlight the blue-grey tones
- Test finish on scrap first
- Clear coats showcase the natural patterns best
buying_tips:
- Select boards for figure consistency and pattern appeal
- All insect activity ceases after kiln-drying — wood is safe
- Inspect bore hole density for your taste
- Consider visual impact in the final design
fun_fact: Ambrosia Maple isn't actually a species — it's the creative result of the Ambrosia beetle boring into soft maple
  and leaving behind artistic fungal staining. Every board is one-of-a-kind.
comparisons:
- title: Ambrosia Maple vs Standard Soft Maple
  rows:
  - Property: Appearance
    Ambrosia Maple: Grey/blue streaks + bore holes
    Standard Soft Maple: Uniform light colour
  - Property: Janka Hardness
    Ambrosia Maple: 700–950 lbf
    Standard Soft Maple: 700–950 lbf
  - Property: Visual Character
    Ambrosia Maple: High artistic appeal
    Standard Soft Maple: Minimal pattern
  - Property: Price
    Ambrosia Maple: Higher (unique figure)
    Standard Soft Maple: Lower baseline
  - Property: Workability
    Ambrosia Maple: Excellent
    Standard Soft Maple: Excellent
- title: Ambrosia Maple vs Spalted Maple
  rows:
  - Property: Cause
    Ambrosia Maple: Beetle + fungal staining
    Spalted Maple: Fungal decay (spalting)
  - Property: Structural Integrity
    Ambrosia Maple: Fully sound
    Spalted Maple: Can be soft/punky
  - Property: Colour Palette
    Ambrosia Maple: Grey, blue, brown streaks
    Spalted Maple: Black zone lines
  - Property: Workability
    Ambrosia Maple: Standard maple
    Spalted Maple: Varies (soft spots)
  - Property: Stability
    Ambrosia Maple: Reliable
    Spalted Maple: Unpredictable
faqs:
- q: Are there live bugs in the wood?
  a: No — kiln-drying halts all insect activity. The wood is completely safe and stable.
- q: Is it as strong as regular Maple?
  a: Yes — the beetle tunnels are cosmetic. Structural integrity is the same as soft maple.
- q: Why is it called 'wormy maple'?
  a: Historical name, though beetles (not worms) create the characteristic patterns.
