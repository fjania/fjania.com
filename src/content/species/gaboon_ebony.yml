name: Gaboon Ebony
also_known_as:
- African Ebony
- Cameroon Ebony
scientific: Diospyros crassiflora
origin: Central and West Africa (Cameroon, Gabon, Congo, Equatorial Guinea, Nigeria)
appearance:
  heartwood: Jet black, occasionally with dark brown or grey-brown streaks
  sapwood: Pale white to creamy yellow; sharply demarcated from heartwood
  grain: Straight to slightly interlocked; occasionally wavy
  texture: Very fine and uniform with nearly invisible pores
  luster: High natural lustre; polishes to an exceptional mirror-like sheen
properties:
  janka: 3080
  density: 0.96 sg (60 lbs/ft3 — sinks in water)
  workability: Difficult to machine due to extreme hardness and density; dulls cutting edges rapidly; use carbide tooling and expect frequent sharpening
  turning: Excellent — holds fine detail beautifully and produces smooth, polished surfaces straight off the tool
  gluing: Generally good with standard adhesives; ensure fresh, clean surfaces for best bond
  finishing: Superb — takes a mirror polish with fine sanding alone; minimal topcoat needed
uses:
- Piano keys (black keys)
- Guitar and string instrument fingerboards and bridges
- Fine woodturning (pens, bottle stoppers, handles)
- Decorative inlays and marquetry
- Pool cue butts and ferrules
- Luxury knife handles and jewellery boxes
advantages:
- Considered the blackest wood in the world
- Exceptional polish and lustre without any finish
- Extremely hard and durable (3,080 lbf Janka)
- Very fine, uniform texture ideal for precision work
- Iconic appearance prized for centuries in fine craftsmanship
challenges:
- Extremely hard on cutting tools — carbide or HSS required
- Very expensive — typically sold by the piece rather than board foot
- Heavy and dense — practical only in small pieces
- Fine dust is a respiratory irritant — always wear a mask
- Can be brittle and prone to checking if dried too quickly
finishing_tips:
- Often needs no finish — sand to 600-800 grit and buff for a glass-like sheen
- Tung oil followed by a coat of wax produces a subtle, natural finish
- Avoid thick film finishes (polyurethane, lacquer) — they are unnecessary and can detract
- If using CA finish on turnings, apply thin coats and watch for cloudiness from moisture
buying_tips:
- Perform the water sink test — a 1-inch cube of genuine ebony sinks within seconds
- Always request photos of the actual piece, not stock images
- Verify legal sourcing — Diospyros crassiflora is IUCN Endangered
- Smaller turning blanks and pen blanks are the most accessible and affordable entry point
fun_fact: Gaboon Ebony is widely considered the blackest wood on Earth. It is so dense
  (specific gravity ~0.96) that it sinks in water, and it has been treasured since ancient
  Egypt, where it was valued as highly as gold and ivory for royal furniture and sarcophagi.
comparisons:
- title: Gaboon Ebony vs African Blackwood
  rows:
  - Property: Janka Hardness
    Gaboon Ebony: 3,080 lbf
    African Blackwood: 3,670 lbf
  - Property: Colour
    Gaboon Ebony: Jet black
    African Blackwood: Black with violet tones
  - Property: Oiliness
    Gaboon Ebony: Dry
    African Blackwood: Naturally oily
  - Property: Primary Use
    Gaboon Ebony: Piano keys, inlays, fingerboards
    African Blackwood: Woodwind instruments
  - Property: Turning
    Gaboon Ebony: Excellent but can be brittle
    African Blackwood: Exceptional
  - Property: Price
    Gaboon Ebony: Very expensive
    African Blackwood: Extremely expensive
- title: Gaboon Ebony vs Ceylon Ebony
  rows:
  - Property: Scientific Name
    Gaboon Ebony: Diospyros crassiflora
    Ceylon Ebony: Diospyros ebenum
  - Property: Origin
    Gaboon Ebony: Central/West Africa
    Ceylon Ebony: Sri Lanka, India
  - Property: Colour Uniformity
    Gaboon Ebony: Very uniform jet black
    Ceylon Ebony: Black, sometimes with brown streaks
  - Property: Availability
    Gaboon Ebony: More available (but still scarce)
    Ceylon Ebony: Extremely rare commercially
  - Property: Density
    Gaboon Ebony: 0.96 sg
    Ceylon Ebony: 1.12 sg
faqs:
- q: Is Gaboon Ebony endangered?
  a: Yes. Diospyros crassiflora is classified as Endangered on the IUCN Red List due to
    over 50% population decline from exploitation. It is not CITES-listed, but always verify
    that your source harvests legally and sustainably.
- q: Can I use regular tools to work Gaboon Ebony?
  a: Standard high-speed steel tools will work but dull very quickly. Carbide-tipped blades
    and cutters are strongly recommended. For hand tools, expect frequent sharpening. Use a
    bandsaw rather than a table saw to reduce waste.
- q: Why is Gaboon Ebony so expensive?
  a: Its extreme density, slow growth, limited heartwood yield, endangered status, and
    centuries-long demand for musical instruments and luxury goods all contribute to its
    premium price. It is typically sold by the individual piece rather than by the board foot.
