name: Hickory
also_known_as:
- Pecan
scientific: Carya spp.
origin: Eastern North America
appearance:
  heartwood: Light to medium brown with reddish undertones
  sapwood: Creamy white to pale tan; strong contrast with heartwood
  grain: Typically straight, often wavy or irregular
  texture: Medium to coarse
  luster: Moderate natural sheen
properties:
  janka: 1820
  density: 0.72 sg (extremely dense)
  workability: Challenging but manageable with sharp tooling
  turning: Good results with sharp tools; dramatic grain shows well
  gluing: Excellent when pre-drilled for fasteners
  finishing: Accepts stains and clear coats well
uses:
- Cutting boards & butcher blocks
- Cabinetry & furniture
- Tool handles & mallets
- Stair treads & flooring
- Workbenches & shop fixtures
- Tabletops & heavy-use surfaces
advantages:
- Exceptional strength & impact resistance
- Dramatic visual character (heartwood/sapwood contrast)
- Outstanding wear resistance
- Legendary durability for high-use items
- Domestic availability and sustainability
challenges:
- Requires sharp tooling at all times
- Can tear out with aggressive passes
- Difficult to work with dull blades
- Significant density variation between boards
finishing_tips:
- Use sharp blades — dull tools cause tear-out
- Sand progressively to 220+ grit
- Oil finishes highlight the grain contrast
- Pre-drill for all fasteners
buying_tips:
- Select kiln-dried stock for stability
- Verify careful milling
- Expect dramatic colour variation board-to-board
- Calico (mixed heartwood/sapwood) adds character
fun_fact: Hickory was the go-to wood for wagon wheels, ladder rungs, and tool handles throughout American history — failure
  simply wasn't acceptable.
comparisons:
- title: Hickory Heartwood vs Sapwood
  rows:
  - Property: Colour
    Heartwood: Medium brown, reddish
    Sapwood: Creamy white
  - Property: Hardness
    Heartwood: Same (1,820 lbf)
    Sapwood: Same (1,820 lbf)
  - Property: Character
    Heartwood: Rich, warm
    Sapwood: Clean, bright
  - Property: Popular For
    Heartwood: Rustic furniture
    Sapwood: Contemporary looks
- title: Hickory vs White Oak
  rows:
  - Property: Janka Hardness
    Hickory: 1,820 lbf
    White Oak: 1,360 lbf
  - Property: Impact Resistance
    Hickory: Exceptional
    White Oak: Good
  - Property: Weight
    Hickory: Heavier
    White Oak: Heavy
  - Property: Workability
    Hickory: Challenging
    White Oak: Moderate
  - Property: Colour Range
    Hickory: Wide variation
    White Oak: Consistent
faqs:
- q: Is Hickory too hard to work by hand?
  a: It's challenging but not impossible — keep tools sharp and take light passes.
- q: Hickory vs Maple for cutting boards?
  a: Both excellent. Hickory adds dramatic visual contrast; Maple offers a cleaner look.
- q: Does Hickory stain well?
  a: Yes, but test first — the sapwood and heartwood absorb stain differently.
