name: Birch
also_known_as:
- Yellow Birch
- Sweet Birch
- River Birch
- Paper Birch
scientific: Betula alleghaniensis
origin: North America (Great Lakes region, New England, Appalachian Mountains, southern Ontario and Quebec)
appearance:
  heartwood: Light reddish brown with warm golden undertones
  sapwood: Nearly white to pale cream; widely used for its uniform colour
  grain: Generally straight, occasionally wavy or curly
  texture: Fine and even with a smooth, consistent feel
  luster: Moderate natural sheen; polishes well
properties:
  janka: 1260
  density: 0.62 sg (medium-heavy)
  workability: Machines well with sharp tools; wild grain can cause tear-out
  turning: Good results on the lathe with crisp detail
  gluing: Can be difficult — synthetic adhesives recommended over natural glues; pre-drill for fasteners
  finishing: Takes finishes well but prone to blotching; use a pre-stain conditioner or sanding sealer before applying stain
uses:
- Furniture & cabinetry
- Interior doors & trim
- Veneer & plywood
- Cutting boards & kitchen utensils
- Tool handles
- Flooring
advantages:
- Hard and durable with excellent wear resistance
- Fine, even texture produces smooth surfaces
- Widely available and reasonably priced
- Takes clear finishes beautifully
- Good bending strength (16,600 psi)
challenges:
- Prone to blotching when stained without conditioner
- Gluing can be tricky — requires synthetic adhesives
- Significant shrinkage during drying; prone to warping
- Perishable — not suitable for outdoor or exposed use
- Wild grain can cause tear-out during machining
finishing_tips:
- Always apply a pre-stain conditioner or sanding sealer before staining
- Oil finishes highlight the natural warmth of the grain
- Water-based finishes preserve the lighter colour
- Sand to 320+ grit for a glass-smooth surface
buying_tips:
- Select sapwood boards for a consistent, light appearance
- Inspect for warping — birch is prone to movement during drying
- FAS grade ensures clear, uniform boards
- Store flat and well-stickered to prevent further warping
fun_fact: Birch is a pioneer species — one of the first trees to colonise disturbed land after fires or
  logging, rapidly growing to fill gaps in the forest canopy.
comparisons:
- title: Birch vs Hard Maple
  rows:
  - Property: Janka Hardness
    Birch: 1,260 lbf
    Hard Maple: 1,450 lbf
  - Property: Colour
    Birch: Light reddish brown
    Hard Maple: Pale cream/white
  - Property: Grain
    Birch: Straight, occasionally wavy
    Hard Maple: Straight, sometimes figured
  - Property: Staining
    Birch: Prone to blotching
    Hard Maple: Also blotch-prone
  - Property: Price
    Birch: More affordable
    Hard Maple: Higher
- title: Birch vs Cherry
  rows:
  - Property: Janka Hardness
    Birch: 1,260 lbf
    Cherry: 995 lbf
  - Property: Colour
    Birch: Light reddish brown
    Cherry: Pinkish to deep reddish brown
  - Property: Darkens Over Time
    Birch: Slightly
    Cherry: Significantly
  - Property: Workability
    Birch: Good with sharp tools
    Cherry: Excellent — very forgiving
  - Property: Best For
    Birch: Utility & cabinetry
    Cherry: Fine furniture & heirloom pieces
faqs:
- q: Is Birch good for cutting boards?
  a: Yes — its hardness and fine grain make it a solid choice, though Hard Maple is the traditional favourite for food-contact surfaces.
- q: Can Birch be used outdoors?
  a: No. Birch is perishable and will readily rot and decay if exposed to moisture or the elements.
- q: Why does Birch blotch when stained?
  a: Its varying density absorbs stain unevenly. A pre-stain conditioner or sanding sealer applied first gives much more consistent colour.
