name: African Blackwood
also_known_as:
- Grenadilla
- Mpingo
scientific: Dalbergia melanoxylon
origin: East Africa (Tanzania, Mozambique)
appearance:
  heartwood: Jet black to deep violet-brown with dark streaks
  sapwood: Pale yellow-white; sharp contrast when visible
  grain: Straight to slightly interlocked
  texture: Very fine and uniform; naturally oily
  luster: Subtle natural polish even before finishing
properties:
  janka: 3670
  density: 1.27 sg (extremely heavy; sinks readily)
  workability: Excellent for turning and fine cutting; tough on dull tools
  turning: Exceptional — ideal for fine detail and mirror finishes
  gluing: Requires fresh surfaces due to natural oils
  finishing: Superb — polishes to glass-like sheen without topcoat
uses:
- Musical instruments (clarinets, oboes, bagpipes)
- Fine turning (pens, bowls, handles)
- Knife handles & precision tools
- Luxury furniture inlays
- Sculptural art & jewellery boxes
- High-end woodwind instruments
advantages:
- One of the world's hardest woods (3,670 lbf)
- Dimensional stability — minimal climate movement
- Natural mirror-like polish without coatings
- Acoustic properties unmatched for woodwinds
- Extremely fine, uniform texture
challenges:
- Extremely hard on cutting tools
- Very expensive — often sold by the piece
- Heavy and dense — small pieces only practical
- Dust can be irritating — use respiratory protection
- Slow-growing — sustainability concerns
finishing_tips:
- Often needs no finish — polishes naturally
- Buff with fine compound for mirror sheen
- If finishing, use thin oil or wax only
- Avoid thick film finishes — unnecessary
buying_tips:
- Sold by the piece, not by the board foot
- Instrument-grade commands extreme premiums
- Smaller turning blanks are more accessible
- Verify sustainable/legal sourcing (CITES listed)
fun_fact: African Blackwood is often priced higher than gold by weight in instrument-grade billets. It's the world's most
  expensive commercial timber and the gold standard for professional clarinets and oboes.
comparisons:
- title: African Blackwood by Grade
  rows:
  - Property: Colour
    Instrument Grade: Jet black, uniform
    Craft/Turning Grade: May have streaks
  - Property: Defects
    Instrument Grade: None
    Craft/Turning Grade: Minor permitted
  - Property: Size
    Instrument Grade: Larger billets
    Craft/Turning Grade: Smaller blanks
  - Property: Price
    Instrument Grade: Extreme premium
    Craft/Turning Grade: More accessible
  - Property: Use
    Instrument Grade: Pro instruments
    Craft/Turning Grade: Pens, bowls, handles
- title: African Blackwood vs Ebony
  rows:
  - Property: Janka Hardness
    African Blackwood: 3,670 lbf
    Gabon Ebony: 3,080 lbf
  - Property: Colour
    African Blackwood: Black with violet tones
    Gabon Ebony: Jet black
  - Property: Oiliness
    African Blackwood: Naturally oily
    Gabon Ebony: Dry
  - Property: Primary Use
    African Blackwood: Woodwinds
    Gabon Ebony: Piano keys, inlays
  - Property: Turning
    African Blackwood: Exceptional
    Gabon Ebony: Good but brittle
faqs:
- q: Why is it so expensive?
  a: Slow growth, small trees, extreme demand for instruments, and limited supply drive prices above many precious metals
    by weight.
- q: Can beginners work with it?
  a: For turning, yes — it cuts beautifully. For joinery, the extreme hardness makes it challenging.
- q: Is it sustainable?
  a: It's CITES-listed. Always buy from verified sustainable sources and support reforestation efforts.
