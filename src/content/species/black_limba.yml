name: Black Limba
also_known_as:
- Limba
- Korina
scientific: Terminalia superba
origin: West & Central Africa (Ghana, Ivory Coast)
appearance:
  heartwood: Light golden-yellow with deep black/dark brown streaks
  sapwood: Pale white or cream, blending softly into heartwood
  grain: Straight to interlocked; dramatic figure
  texture: Medium to coarse
  luster: Good natural sheen under finish
properties:
  janka: 670
  density: 0.45 sg (medium-light; excellent strength-to-weight)
  workability: Exceptionally easy to work; machines, sands, and glues easily
  turning: Produces fine, clean finish on the lathe
  gluing: Glues easily with standard adhesives
  finishing: Accepts oils and clear coats beautifully; grain comes alive
uses:
- Furniture & cabinetry
- Guitar bodies & musical instruments
- Decorative veneers & inlays
- Live edge slabs & tabletops
- Turned objects & sculptural pieces
- Accent walls & fine joinery
advantages:
- Visually striking natural figure
- Lightweight yet strong
- Easy machining & clean cutting
- Excellent finishing potential
- Stable and reliable
- Outstanding for bookmatching
challenges:
- Interlocked grain may cause tear-out
- Requires sharp cutters for best results
- Exotic pricing (imported)
- Colour/figure varies significantly board to board
finishing_tips:
- Use sharp cutters to prevent tear-out
- Satin or gloss clear coats enhance grain
- Oil finishes bring out the golden tones
- Light sanding between coats for best results
buying_tips:
- Select boards with bold streaking patterns
- Consider bookmatching for dramatic symmetry
- Inspect for figure quality and consistency
- Pairs beautifully with lighter woods as accents
fun_fact: Black Limba (known locally as 'Akom') comes from the same species as White Limba — the dramatic dark streaking is
  what sets it apart and makes it prized.
comparisons:
- title: Black Limba vs White Limba
  rows:
  - Property: Colour
    Black Limba: Golden + black streaks
    White Limba: Uniform pale yellow
  - Property: Figure
    Black Limba: Dramatic, varied
    White Limba: Subtle, even
  - Property: Hardness
    Black Limba: 670 lbf (same)
    White Limba: 670 lbf (same)
  - Property: Price
    Black Limba: Premium (figure)
    White Limba: More affordable
  - Property: Appeal
    Black Limba: Show pieces
    White Limba: Utility / subtle
- title: Black Limba vs Mahogany
  rows:
  - Property: Janka Hardness
    Black Limba: 670 lbf
    Mahogany: 800–900 lbf
  - Property: Weight
    Black Limba: Lightweight
    Mahogany: Moderate
  - Property: Workability
    Black Limba: Excellent
    Mahogany: Good
  - Property: Figure
    Black Limba: Dramatic streaking
    Mahogany: Subtle ribbon grain
  - Property: Common Use
    Black Limba: Guitars, art furniture
    Mahogany: Traditional furniture
faqs:
- q: How does Black Limba compare to White Limba?
  a: Same species — Black Limba has dramatic dark streaks and contrasting figure that White Limba lacks.
- q: Is Black Limba difficult to work?
  a: No — it's one of the most user-friendly tropical hardwoods with excellent machining properties.
- q: What finishes work best?
  a: Oils and clear coats enhance the grain beautifully, particularly satin or gloss finishes.
