name: Canarywood
scientific: Centrolobium spp.
origin: Tropical Central and South America (Brazil, Bolivia, Colombia, Venezuela, Panama, Mexico)
appearance:
  heartwood: Bright yellow-orange base with vivid irregular streaks of red, orange, purple, and brown; darkens to a reddish-brown over time
  sapwood: Pale yellowish-white, clearly demarcated from the heartwood
  grain: Usually straight, but can be interlocked or irregular on some boards
  texture: Medium to fine, uniform
  luster: Medium to high natural luster
properties:
  janka: 1958
  density: 0.65 sg (comparable to Red Oak)
  workability: Good overall; machines, glues, and shapes comparably to American Black Walnut — some tearout possible on interlocked grain
  turning: Turns well; minor density variation between heartwood and sapwood may cause uneven sanding on the lathe
  gluing: Good — not oily like Teak or Rosewoods, so no special preparation is needed
  finishing: Finishes very well; lacquer preserves natural colour, while oil-based finishes deepen and enrich the tones
uses:
- Furniture & cabinetry
- Flooring & interior millwork
- Veneers & decorative panels
- Turned objects (bowls, pens, handles)
- Musical instruments & speaker enclosures
- Boatbuilding & exterior construction
advantages:
- Striking multi-coloured appearance — yellow, orange, red, and purple in a single board
- Very durable; highly resistant to decay, termites, and marine borers
- Good workability despite its density — comparable to Black Walnut
- No oily surface, so gluing and finishing are straightforward
- Each board is unique due to extreme colour and grain variation
challenges:
- Colour darkens significantly over time to a more uniform reddish-brown
- Interlocked or wild grain can cause tearout during planing
- Density variation between heartwood and sapwood complicates even sanding
- Availability can be limited; sourcing is periodic due to conservation management
- Dust can be irritating — use proper dust collection and respiratory protection
finishing_tips:
- Use lacquer or water-based finishes to preserve the bright natural colours
- Oil or wax finishes will deepen and warm the tones but slightly darken the wood
- UV-protective finishes (marine spar varnish, UV-inhibiting lacquer) slow colour change
- Sand through grits progressively to at least 320 for the smoothest finish
buying_tips:
- Expect to pay approximately $18-22 per board foot for 4/4 stock
- Colour and grain vary enormously between boards — hand-select when possible
- Availability is periodic; buy when you find quality stock as it may not be restocked soon
- Acclimate boards before milling, as Canarywood can move with moisture changes
fun_fact: Canarywood gets its name not from its colour but from the Canary Islands, which were themselves
  named after dogs (Latin "canis"). The wood's vivid yellow-orange hue is merely a happy coincidence
  with the yellow canary bird — making this a species named after dogs that looks like it was named
  after birds.
comparisons:
- title: Canarywood vs Zebrawood
  rows:
  - Property: Janka Hardness
    Canarywood: 1,958 lbf
    Zebrawood: 1,575 lbf
  - Property: Density
    Canarywood: 0.65 sg
    Zebrawood: 0.73 sg
  - Property: Colour
    Canarywood: Multi-coloured (yellow, orange, red, purple)
    Zebrawood: Light tan with dark brown/black streaks
  - Property: Grain Pattern
    Canarywood: Irregular multi-colour streaking
    Zebrawood: Bold, regular dark stripes
  - Property: Workability
    Canarywood: Good — similar to Black Walnut
    Zebrawood: Moderate — interlocked grain causes tearout
  - Property: Price
    Canarywood: Moderate ($18-22/bf)
    Zebrawood: Moderate ($12-18/bf)
- title: Canarywood Colour Over Time
  rows:
  - Stage: Freshly Milled
    Colour: Bright yellow-orange with vivid red and purple streaks
    Timeframe: Days
  - Stage: Early Aging
    Colour: Deeper orange, streaks become less contrasting
    Timeframe: 1-6 months
  - Stage: Mature
    Colour: Warm reddish-brown with muted streaking
    Timeframe: 1-3 years
  - Stage: Aged (unfinished)
    Colour: Uniform medium reddish-brown
    Timeframe: 5+ years
  - Stage: Aged (UV finish)
    Colour: Preserved deeper orange-red with visible streaks
    Timeframe: Decades
faqs:
- q: Does Canarywood lose its vibrant colour over time?
  a: Yes, Canarywood darkens from its initial bright yellow-orange with vivid streaks to a more uniform
    reddish-brown over time. A UV-protective finish significantly slows this process and helps preserve
    the multi-coloured character for years.
- q: Is Canarywood difficult to work with?
  a: Not at all — it machines, glues, and finishes comparably to American Black Walnut. The main
    challenge is occasional tearout on boards with interlocked or wild grain, which can be managed
    by reducing cutting angles or using a card scraper.
- q: Is Canarywood sustainable and readily available?
  a: Canarywood is not currently listed on the CITES appendices or IUCN Red List, but availability
    is managed carefully. It appears on the market periodically rather than continuously, so it is
    wise to purchase quality stock when you find it.
