name: Red Oak
also_known_as:
- Northern Red Oak
- American Red Oak
- Canadian Red Oak
- Gray Oak
scientific: Quercus rubra
origin: Eastern North America
appearance:
  heartwood: Light to medium reddish-brown with a pinkish cast
  sapwood: Pale white to light brown, clearly demarcated from heartwood
  grain: Straight, with a bold, open cathedral pattern on flat-sawn surfaces
  texture: Coarse and uneven, with large pores visible to the naked eye
  luster: Low natural sheen; responds well to finishing for added lustre
properties:
  janka: 1290
  density: 0.63 sg (medium-heavy)
  workability: Good overall; machines, nails, and screws well with sharp tooling
  turning: Performs adequately on the lathe though coarse pores may require filling
  gluing: Good results with standard wood glues
  finishing: Takes stain readily but may blotch without conditioner on flat-sawn stock
uses:
- Furniture & cabinetry
- Flooring & stair treads
- Interior trim & moulding
- Doors & panelling
- Veneer & plywood
- Shop jigs & utility projects
advantages:
- Most widely available North American hardwood, keeping costs moderate
- Bold, distinctive grain pattern adds visual character
- Accepts stain readily for a wide range of colour options
- Good structural strength and hardness for interior applications
- Machines, nails, and screws without difficulty
challenges:
- Open pores require grain filler for a smooth, closed finish
- No natural rot resistance — unsuitable for outdoor or marine use
- Reacts with ferrous metals, causing dark tannin stains
- Can blotch when stained without pre-stain conditioner
- Pinkish-red tone limits colour-matching with some species
finishing_tips:
- Apply pre-stain conditioner before oil-based stains to reduce blotching
- Use paste wood filler on flat-sawn surfaces for a glass-smooth finish
- Water-based polyurethane preserves the natural reddish tone
- Avoid prolonged contact with ferrous hardware on unfinished surfaces
buying_tips:
- Readily available at most hardwood dealers and home centres
- FAS grade for furniture; No. 1 Common offers value with more character
- Quarter-sawn stock is more stable and shows prominent ray fleck
- Inspect boards for consistent colour — heartwood can vary from pink to brown
fun_fact: Red Oak is the single most commercially harvested hardwood in North America, accounting for a larger share of U.S. hardwood production than any other species.
comparisons:
- title: Red Oak vs White Oak
  rows:
  - Property: Janka Hardness
    Red Oak: 1,290 lbf
    White Oak: 1,360 lbf
  - Property: Colour
    Red Oak: Pinkish-red tone
    White Oak: Olive/golden brown
  - Property: Rot Resistance
    Red Oak: Poor
    White Oak: Excellent (tyloses)
  - Property: Grain
    Red Oak: Open, coarse pores
    White Oak: Tighter, finer pores
  - Property: Outdoor Use
    Red Oak: Not recommended
    White Oak: Suitable
- title: Red Oak vs Hard Maple
  rows:
  - Property: Janka Hardness
    Red Oak: 1,290 lbf
    Hard Maple: 1,450 lbf
  - Property: Colour
    Red Oak: Reddish-brown
    Hard Maple: Creamy white
  - Property: Grain
    Red Oak: Bold, open
    Hard Maple: Fine, closed
  - Property: Staining
    Red Oak: Takes stain readily
    Hard Maple: Can blotch; harder to stain evenly
  - Property: Price
    Red Oak: Moderate
    Hard Maple: Moderate to high
faqs:
- q: Can Red Oak be used outdoors?
  a: No — Red Oak lacks the tyloses and natural rot resistance of White Oak, making it unsuitable for exterior or ground-contact applications.
- q: Does Red Oak need grain filler?
  a: For a smooth, closed-pore finish it does. The large open pores will telegraph through paint or film finishes without paste wood filler.
- q: How does Red Oak compare to White Oak for furniture?
  a: Both are excellent furniture woods. Red Oak has a bolder grain and stronger pink-red tone, while White Oak offers a more neutral colour and better moisture resistance.
