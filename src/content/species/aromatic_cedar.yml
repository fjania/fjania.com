name: Aromatic Cedar
also_known_as:
- Eastern Red Cedar
- Red Cedar
scientific: Juniperus virginiana
origin: Eastern North America
appearance:
  heartwood: Rich reddish-purple; ages to warm golden reddish-brown
  sapwood: Pale yellow or creamy white
  grain: Fine, uniform with tight knots and colour streaks
  texture: Fine and uniform
  luster: Warm natural glow
properties:
  janka: 900
  density: 0.47 sg (light to moderate)
  workability: Machines well with sharp tools; soft enough for hand work
  turning: Good for small turned items; aromatic shavings
  gluing: Good with standard wood glues
  finishing: Ages beautifully; many leave unfinished for aroma
uses:
- Closet lining & storage chests
- Furniture interiors & drawers
- Decorative panels & accent walls
- Heirloom blanket chests
- Jewellery boxes
- Moth-repellent applications
advantages:
- Distinctive pleasant fragrance
- Natural moth & insect repellent
- Vivid heartwood/sapwood colour contrast
- Fine, workable grain
- Aroma persists for years in enclosed spaces
- Naturally decay resistant
challenges:
- Softwood — dents more easily than hardwoods
- Knots can be challenging to work around
- Not suitable for food contact (aromatic oils)
- Narrow boards from smaller trees
finishing_tips:
- Leave unfinished in closets to preserve aroma
- Light sanding renews the scent over time
- If finishing, use clear shellac or lacquer
- Avoid polyurethane — it seals in the scent
buying_tips:
- Smell the wood — fresh stock should be fragrant
- Look for dramatic heartwood/sapwood contrast
- Select based on end use (closet vs decorative)
- Wider boards are rarer and command premiums
fun_fact: Aromatic Cedar isn't a true cedar at all — it's actually a juniper species! The scent comes from natural essential
  oils that effectively repel moths and insects.
comparisons:
- title: Finished vs Unfinished Aromatic Cedar
  rows:
  - Property: Aroma
    Unfinished: Full fragrance
    Finished: Reduced/sealed
  - Property: Colour
    Unfinished: Vivid red-purple
    Finished: Preserved but muted
  - Property: Best For
    Unfinished: Closets, chests
    Finished: Decorative panels
  - Property: Maintenance
    Unfinished: Sand to renew scent
    Finished: Standard care
- title: Aromatic Cedar vs Western Red Cedar
  rows:
  - Property: Species
    Aromatic (Eastern Red): Juniperus virginiana
    Western Red: Thuja plicata
  - Property: Aroma
    Aromatic (Eastern Red): Strong, distinctive
    Western Red: Mild
  - Property: Hardness
    Aromatic (Eastern Red): ~900 lbf
    Western Red: ~350 lbf
  - Property: Primary Use
    Aromatic (Eastern Red): Interior/closets
    Western Red: Exterior/decking
  - Property: Insect Repellent
    Aromatic (Eastern Red): Excellent
    Western Red: Moderate
faqs:
- q: Does the scent fade?
  a: It lasts years in enclosed spaces. Light sanding with fine grit renews the fragrance.
- q: Is Aromatic Cedar safe for food contact?
  a: No — the aromatic oils make it unsuitable for cutting boards or food storage.
- q: Can I use it outdoors?
  a: It has some rot resistance but is better suited to interior applications. Western Red Cedar is better for outdoor use.
