name: Gonçalo Alves
also_known_as:
- Tigerwood
- Jobillo
scientific: Astronium fraxinifolium / A. graveolens
origin: Central and South America (Mexico, Brazil, Paraguay, Uruguay)
appearance:
  heartwood: Medium reddish-brown to golden-brown with irregularly spaced streaks of dark brown to black; darkens with age
  sapwood: Brownish-white to brownish-grey, distinctly demarcated, up to 100 mm wide
  grain: Usually wavy or interlocked, occasionally straight; creates the distinctive tiger-stripe figure
  texture: Fine and uniform
  luster: High natural luster; polishes to a glass-like finish
properties:
  janka: 2170
  density: 0.91 sg (heavy; approximately 57 lbs/ft³)
  workability: Moderately difficult due to high density and interlocked grain; figured pieces can tear out during planing — reduce cutting angle or use climb cuts
  turning: Excellent; turns smoothly despite density and finishes with an impressive shine on the lathe
  gluing: Challenging — natural oils and low moisture absorption interfere with adhesion; wipe surfaces with acetone before gluing
  finishing: Excellent; takes finish readily and polishes to a remarkable glass-like clarity with minimal effort
uses:
- Fine furniture & cabinetry
- Flooring & decking
- Turned objects (bowls, pens, handles)
- Musical instruments (guitars)
- Knife handles, gun stocks & tool handles
- Boatbuilding & marine applications
advantages:
- Striking tiger-stripe figure — one of the most visually dramatic hardwoods available
- Exceptionally hard and durable (2,170 lbf Janka — 70% harder than Red Oak)
- Very resistant to decay, rot, and insect attack
- Polishes to a brilliant, glass-like finish with minimal effort
- Excellent dimensional stability once properly dried
challenges:
- Interlocked grain can tear out during planing and machining — sharp tooling and reduced angles essential
- Natural oils make gluing difficult; surfaces must be degreased with acetone before bonding
- High density dulls cutting tools more quickly than most species
- Can be difficult to dry — prone to warping and checking if dried too rapidly
- Expensive and sometimes difficult to source in wider boards
finishing_tips:
- Wipe surfaces with acetone or denatured alcohol before applying any finish to remove natural oils
- Oil finishes (tung oil, Danish oil) enhance the contrast between light and dark streaks beautifully
- Spray lacquer or polyurethane provides excellent protection while preserving the natural luster
- Sand progressively to at least 400 grit for a superb natural polish even before applying finish
buying_tips:
- Expect to pay approximately $12–18+ per board foot depending on figure and width
- Select boards carefully — the intensity of the tiger-stripe figure varies widely from board to board
- Boards are often available in decent widths (trees reach 36″ diameter) but figured stock commands a premium
- Acclimate boards slowly before milling to reduce warping and internal stress
fun_fact: The name "Tigerwood" comes from the bold dark streaks that stripe across the lighter background,
  resembling a tiger's coat. In its native Brazil, the tree is valued not only for its timber but also for its
  tannin-rich bark, which has been used in traditional medicine and leather tanning for centuries.
comparisons:
- title: Gonçalo Alves vs Zebrawood
  rows:
  - Property: Janka Hardness
    Gonçalo Alves: 2,170 lbf
    Zebrawood: 1,830 lbf
  - Property: Density
    Gonçalo Alves: Heavy (57 lbs/ft³)
    Zebrawood: Heavy (50 lbs/ft³)
  - Property: Figure
    Gonçalo Alves: Irregular dark streaks on reddish-brown — tiger-stripe
    Zebrawood: Regular dark stripes on pale straw — zebra-stripe
  - Property: Workability
    Gonçalo Alves: Moderate — interlocked grain can tear
    Zebrawood: Moderate — interlocked grain can tear
  - Property: Finishing
    Gonçalo Alves: Excellent — polishes to glass-like clarity
    Zebrawood: Good — requires filler for open pores
  - Property: Price
    Gonçalo Alves: Moderate–high ($12–18/bf)
    Zebrawood: Moderate–high ($10–16/bf)
- title: Gonçalo Alves vs Jatoba (Brazilian Cherry)
  rows:
  - Property: Janka Hardness
    Gonçalo Alves: 2,170 lbf
    Jatoba: 2,350 lbf
  - Property: Density
    Gonçalo Alves: 0.91 sg
    Jatoba: 0.91 sg
  - Property: Colour
    Gonçalo Alves: Reddish-brown with bold dark streaks
    Jatoba: Salmon-red to orange-brown, uniform
  - Property: Figure
    Gonçalo Alves: Dramatic tiger-stripe pattern
    Jatoba: Generally plain, occasionally interlocked
  - Property: Durability
    Gonçalo Alves: Very durable — highly decay-resistant
    Jatoba: Very durable — highly decay-resistant
  - Property: Common Use
    Gonçalo Alves: Furniture, turning, decking
    Jatoba: Flooring, furniture, heavy construction
faqs:
- q: Is Gonçalo Alves the same as Tigerwood?
  a: Yes — Tigerwood is the most common trade name for Gonçalo Alves, especially in the flooring industry.
    The species sold as Tigerwood is typically Astronium graveolens or A. fraxinifolium. Be aware that
    "Tigerwood" is occasionally used for other striped species, so verify the botanical name when buying.
- q: Is Gonçalo Alves suitable for outdoor use?
  a: Yes. Its high density, natural oil content, and excellent decay resistance make it a strong candidate for
    outdoor furniture, decking, and marine applications. It weathers to a silvery grey if left untreated, or
    can be maintained with a UV-protective oil finish.
- q: How do I prevent tear-out when planing Gonçalo Alves?
  a: The interlocked grain makes tear-out common. Use a reduced cutting angle (around 15°), take very light
    passes, and consider climb-cutting on a router table for edges. A card scraper or hand plane set to a fine
    cut often produces the cleanest surface on highly figured boards.
