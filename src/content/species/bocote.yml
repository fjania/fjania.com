faqs:
- q: Will Bocote's colours change over time?
  a: Yes. The golden-yellow tones in the heartwood gradually darken to a deeper tobacco brown with UV exposure, while the dark
    brown and black striping remains stable. A UV-protective finish can slow this process but will not prevent it entirely.
- q: Is Bocote safe for food-contact items?
  a: Bocote is not commonly recommended for food-contact surfaces. It belongs to the Cordia genus, which can cause allergic
    reactions in sensitive individuals. If used, apply a food-safe finish and monitor for any sensitivity reactions.
- q: Can Bocote be used outdoors?
  a: Bocote has good natural rot and insect resistance, but its value, limited board dimensions, and UV-driven colour change make
    it better suited to interior projects. If used outdoors, apply a marine-grade finish and expect the golden tones to darken
    significantly.
