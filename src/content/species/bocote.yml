name: Bocote
scientific: Cordia elaeagnoides
origin: Mexico & Central America (Honduras, Guatemala, Nicaragua)
appearance:
  heartwood: Golden yellow to rich yellowish brown with dramatic dark brown to near-black stripes; yellows fade over time to deeper tobacco brown while dark streaks remain
  sapwood: Pale yellowish to greyish yellow, clearly demarcated from heartwood
  grain: Straight to interlocked; frequently figured with swirls, "eyes," and paisley-like patterns, particularly on flatsawn surfaces. Occasionally displays birdseye figure.
  texture: Medium and uniform
  luster: Naturally high lustre with a distinctive oily/waxy feel that enhances visual depth and produces an exceptional natural polish
properties:
  janka: 2010
  density: 0.85 sg (heavy; ~53 lbs/ft³)
  workability: Generally works well with both hand and power tools; sharp cutters essential due to hardness. Some specimens may contain silica that dulls blades. Machines cleanly and produces good results.
  turning: Excellent on the lathe; produces a silky-smooth natural polish. CA finishes work well for turned pieces. Caution — can burn if sanded too aggressively.
  gluing: Despite high natural oil content, gluing is generally problem-free; wipe surfaces with acetone before applying adhesive for best results
  finishing: Takes a beautiful, high-lustre finish with minimal effort. Natural oils can retard drying of oil-based finishes. Wipe surfaces with acetone before applying finish. Tung oil, Waterlox, and polyurethane all work well.
uses:
- Fine furniture & cabinetry
- Musical instruments (guitar backs, sides & fretboards)
- Turned objects (bowls, pens, handles)
- Decorative veneers & inlays
- Knife handles & gun stocks
- Flooring & boatbuilding
advantages:
- Stunning visual drama — the bold contrast of golden-brown and dark striping is among the most striking of any hardwood
- Exceptional hardness and durability — resistant to dents, wear, and insect attack
- Outstanding finishing properties — achieves a high natural lustre with minimal effort
- Good dimensional stability — minimal warping or shrinkage once properly dried
- More affordable than similar exotics — 25–35% less expensive than its close relative Ziricote
challenges:
- Natural oils complicate adhesion — surface oils can interfere with glue bonds and slow finish drying if not properly prepared
- Can dull cutters — some specimens contain silica; carbide tooling recommended
- Dust sensitivity — can cause skin and respiratory irritation; may trigger cross-reactions in individuals sensitised to Cocobolo or Rosewoods
- Premium pricing — as an exotic import, costs significantly more than domestic hardwoods (~$25–30/board foot)
- Limited board dimensions — typically available in shorter, narrower pieces (3–7 ft long, 3–6 in wide)
finishing_tips:
- Degrease before finishing — wipe the surface with acetone or denatured alcohol immediately before applying any finish
- Tung oil brings out the grain magnificently — let the first coat soak in, wipe dry, then apply subsequent coats at 12-hour intervals
- Avoid over-sanding — excessive speed or pressure generates heat that can burn the wood or cause surface cracks
- Let oil finishes cure fully — oil-based finishes dry slower on Bocote than on non-oily woods; allow extra drying time
buying_tips:
- Inspect for figure — Bocote ranges from plain-grained to spectacularly figured; seek pieces with prominent "eyes" or swirls
- Buy dry stock — ensure lumber is properly kiln-dried or well air-dried (6–8% moisture content)
- Expect small dimensions — boards are typically 3–7 ft long and 3–6 in wide; plan projects accordingly
- Compare to Ziricote — Bocote offers a similar dramatic look at 25–35% lower cost
fun_fact: Bocote trees were historically planted as shade trees for coffee plantations throughout Central America and southern
  Mexico. Today, much of the commercially available Bocote lumber is sustainably harvested from these old plantation shade trees
  using traditional hand-cutting methods and mules for transport — making it one of the more eco-conscious exotic hardwood choices.
