name: Madrone
also_known_as:
- Pacific Madrone
- Madrona
- Arbutus
- Strawberry Tree
scientific: Arbutus menziesii
origin: Pacific coast of North America, from British Columbia to Southern California
appearance:
  heartwood: Light pinkish brown to reddish brown, sometimes with darker red patches
  sapwood: Creamy white with a pinkish tinge; occasionally shows a purplish brown band near the heartwood
  grain: Straight to slightly irregular, with a very fine and even texture
  texture: Very fine and smooth, similar to fruitwoods
  luster: Moderate natural lustre with a satiny quality
properties:
  janka: 1460
  density: 0.58 sg (medium-heavy)
  workability: Good overall; machines cleanly with sharp tools and is easy on cutters despite its hardness
  turning: Excellent; ranks among the best Pacific Northwest hardwoods for turning with exceptional resistance to breakage
  gluing: Bonds well when gluing conditions are properly controlled; pre-boring recommended for nailing
  finishing: Finishes very well without grain filler; takes dyes and transparent stains beautifully
uses:
- Fine furniture & cabinetry
- Turned bowls, platters & spindles
- Flooring & stair parts
- Decorative veneer & panelling
- Musical instruments
- Carving & sculptural work
advantages:
- Exceptionally smooth finish due to fine, tight grain
- Outstanding turning properties with minimal tear-out
- Attractive warm pinkish tones unlike most domestic hardwoods
- Harder than Cherry, Walnut, and many common furniture woods
- Machines cleanly for planing, shaping, and boring
challenges:
- Prone to significant shrinkage and warping during drying (11.9% tangential)
- Can develop blue or purple oxidative staining before kiln drying
- Difficult to nail without pre-boring due to hardness
- Non-durable heartwood; not suitable for outdoor or ground-contact use
- Limited commercial availability outside the Pacific Northwest
finishing_tips:
- No grain filler needed thanks to the fine, tight pore structure
- Use dyes or transparent stains for the best colour; heavily pigmented stains look muddy
- Take care during sanding to avoid surface scratching from fine dust particles
- Can be successfully ebonised for a striking dark finish
buying_tips:
- Source from Pacific Northwest specialty suppliers for best selection
- Inspect for blue or purple oxidative staining that may only appear after planing
- Allow extra material for waste due to drying-related warp and defects
- Burl pieces are highly prized for decorative turning and veneer
fun_fact: Madrone is one of the few broadleaf evergreen hardwoods native to the Pacific Northwest, and its
  smooth reddish bark peels away in papery sheets to reveal bright green new bark underneath, making it
  one of the most visually striking trees in North American forests.
comparisons:
- title: Madrone vs Cherry
  rows:
  - Property: Janka Hardness
    Madrone: 1,460 lbf
    Cherry: 995 lbf
  - Property: Colour
    Madrone: Pinkish brown to reddish brown
    Cherry: Pinkish tan to deep reddish brown
  - Property: Grain
    Madrone: Very fine and tight
    Cherry: Fine and straight
  - Property: Workability
    Madrone: Good; needs sharp tools
    Cherry: Excellent; very forgiving
  - Property: Drying
    Madrone: Difficult; prone to warp
    Cherry: Straightforward
- title: Madrone vs Hard Maple
  rows:
  - Property: Janka Hardness
    Madrone: 1,460 lbf
    Hard Maple: 1,450 lbf
  - Property: Colour
    Madrone: Warm pinkish brown
    Hard Maple: Creamy white to pale gold
  - Property: Texture
    Madrone: Very fine, smooth
    Hard Maple: Fine, uniform
  - Property: Availability
    Madrone: Limited; Pacific Northwest
    Hard Maple: Widely available
  - Property: Turning
    Madrone: Excellent
    Hard Maple: Very good
faqs:
- q: Is Madrone a good wood for furniture?
  a: Yes, Madrone is a superb furniture wood. Its fine grain, attractive pinkish colour, and smooth finishing
    properties make it excellent for high-quality furniture, though it requires careful drying to avoid warping.
- q: Why does Madrone lumber sometimes have blue or purple streaks?
  a: These streaks are caused by chemical oxidative staining that occurs before kiln drying. Prompt drying
    after sawmilling and avoiding tight stacking of wet lumber help prevent this discolouration.
- q: How does Madrone compare to Hard Maple?
  a: The two are remarkably similar in hardness (Madrone 1,460 lbf vs Maple 1,450 lbf) and both have fine
    textures, but Madrone has warmer pinkish tones while Maple is pale and creamy. Madrone is harder to dry
    and less commercially available.
