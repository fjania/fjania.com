name: Alder
also_known_as:
- Red Alder
- Western Red Alder
- Oregon Alder
- Pacific Alder
scientific: Alnus rubra
origin: Coastal Western North America (Alaska to California)
appearance:
  heartwood: Light tan to reddish brown; darkens and reddens with age
  sapwood: No visible distinction from heartwood
  grain: Straight and even, with occasional aggregate rays appearing as small streaks on face grain
  texture: Fine and uniform
  luster: Low natural lustre with a subdued, matte quality
properties:
  janka: 590
  density: 0.41 sg (light)
  workability: Excellent; machines easily by hand or power tools with minimal tear-out
  turning: Fine turning stock; cuts cleanly and holds detail well
  gluing: Excellent adhesion with standard wood glues
  finishing: Very good; accepts stains, oils, and clear finishes evenly
uses:
- Cabinetry & kitchen joinery
- Fine furniture & millwork
- Turnings & carvings
- Musical instrument bodies (electric guitars)
- Mouldings & trim
- Interior panelling & doors
advantages:
- Exceptionally easy to work with hand and machine tools
- Takes stain beautifully — often used to mimic cherry or walnut
- Uniform texture and colour make finishing predictable
- Lightweight yet adequately strong for interior furniture
- Readily available and affordably priced
challenges:
- Soft for a hardwood (590 lbf Janka) — dents and scratches easily
- Susceptible to moisture penetration, especially through end grain
- Not suitable for outdoor or high-moisture applications
- Can develop fuzzy grain if tools are not sharp
- Limited natural decay resistance
finishing_tips:
- Sharp tools are essential to avoid fuzzy grain on sanded surfaces
- Takes stain very evenly — ideal for mimicking cherry or walnut tones
- Oil finishes bring out warmth and deepen the reddish hue
- Seal end grain thoroughly before applying any finish
buying_tips:
- Look for boards with consistent colour — heartwood and sapwood are nearly identical
- Kiln-dried stock is essential as alder is prone to moisture issues
- Often sold as a cherry substitute at a fraction of the price
- Check for aggregate ray streaks if you want a clean, uniform face
fun_fact: Alder is one of the few hardwoods where heartwood and sapwood are virtually
  indistinguishable, giving boards a remarkably uniform appearance straight off the saw.
comparisons:
- title: Alder vs Cherry
  rows:
  - Property: Janka Hardness
    Alder: 590 lbf
    Cherry: 995 lbf
  - Property: Colour
    Alder: Light tan to reddish brown
    Cherry: Pinkish brown, deepens with age
  - Property: Workability
    Alder: Excellent
    Cherry: Excellent
  - Property: Weight
    Alder: Light (0.41 sg)
    Cherry: Moderate (0.50 sg)
  - Property: Price
    Alder: Budget-friendly
    Cherry: Moderate-premium
- title: Alder vs Poplar
  rows:
  - Property: Janka Hardness
    Alder: 590 lbf
    Poplar: 540 lbf
  - Property: Colour
    Alder: Warm tan to reddish brown
    Poplar: Pale green to cream
  - Property: Stainability
    Alder: Even, predictable
    Poplar: Blotchy without conditioner
  - Property: Grain
    Alder: Straight, uniform
    Poplar: Straight, occasionally interlocked
  - Property: Typical Use
    Alder: Visible cabinetry & furniture
    Poplar: Painted work & utility
faqs:
- q: Is Alder a hardwood or softwood?
  a: Alder is technically a hardwood (it comes from a deciduous broadleaf tree), but it is one of the softest hardwoods available, with a Janka rating of just 590 lbf.
- q: Can Alder be used outdoors?
  a: No. Alder has very low natural decay resistance and is highly susceptible to moisture, making it unsuitable for exterior applications.
- q: Why is Alder often compared to Cherry?
  a: Alder accepts stain so evenly that it can closely mimic the warm reddish tones of cherry at a fraction of the cost, making it a popular substitute in cabinetry.
