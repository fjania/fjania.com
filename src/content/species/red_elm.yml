name: Red Elm
also_known_as:
- Slippery Elm
- Soft Elm
- Grey Elm
- Moose Elm
- Indian Elm
scientific: Ulmus rubra
origin: Eastern North America
appearance:
  heartwood: Light to medium reddish brown with a muted tan undertone
  sapwood: Pale yellowish white, clearly distinct from heartwood
  grain: Interlocked and irregular, often with wild, dramatic figure
  texture: Coarse and uneven with a pronounced open-pore structure
  luster: Moderate natural sheen that brightens with finish
properties:
  janka: 860
  density: 0.48 sg (medium)
  workability: Machines easily but interlocked grain can cause tearout during resawing and planing
  turning: Good for bowls and hollow forms; interlocked grain adds visual interest
  gluing: Glues well with standard wood adhesives
  finishing: Stains and finishes well; grain filler recommended for a smooth surface
uses:
- Furniture & cabinetry
- Steam-bent components
- Boxes & utilitarian woodwork
- Veneer & decorative panels
- Flooring & interior trim
- Turned bowls & vessels
advantages:
- Interlocked grain makes it highly resistant to splitting
- Excellent steam-bending properties
- Attractive reddish colour adds warmth to projects
- Readily available as a domestic North American species
- Good shock resistance and flexibility
challenges:
- Interlocked grain can cause tearout when planing or resawing
- Not naturally durable outdoors; suited to interior use only
- Coarse texture requires grain filler for a polished finish
- Poor dimensional stability compared to many hardwoods
- Can be confused with American Elm at the lumber yard
finishing_tips:
- Apply grain filler or sanding sealer to manage the open pores
- Oil finishes enhance the natural reddish-brown colour beautifully
- Sand progressively to at least 220 grit before applying finish
- Test stain on scrap first — interlocked grain can absorb unevenly
buying_tips:
- Often sold simply as Elm — confirm it is Ulmus rubra if colour matters
- Look for boards with minimal wild grain if ease of machining is a priority
- Check for signs of insect damage, as Elm is susceptible to beetle attack
- A good value species offering warmth and character at domestic pricing
fun_fact: Red Elm gets its alternate name Slippery Elm from the mucilaginous inner bark, which
  Indigenous peoples chewed as a sore-throat remedy and used to make poultices — a tradition
  that continues in herbal medicine today.
comparisons:
- title: Red Elm vs White Ash
  rows:
  - Property: Janka Hardness
    Red Elm: 860 lbf
    White Ash: 1,320 lbf
  - Property: Density
    Red Elm: 0.48 sg
    White Ash: 0.60 sg
  - Property: Colour
    Red Elm: Reddish brown
    White Ash: Light beige-brown
  - Property: Grain
    Red Elm: Interlocked, irregular
    White Ash: Straight, bold
  - Property: Steam Bending
    Red Elm: Excellent
    White Ash: Excellent
- title: Red Elm vs American Elm
  rows:
  - Property: Janka Hardness
    Red Elm: 860 lbf
    American Elm: 830 lbf
  - Property: Heartwood Colour
    Red Elm: Reddish brown
    American Elm: Light brown
  - Property: Grain
    Red Elm: Interlocked
    American Elm: Interlocked
  - Property: Texture
    Red Elm: Coarse
    American Elm: Medium to coarse
  - Property: Outdoor Durability
    Red Elm: Non-durable
    American Elm: Non-durable
faqs:
- q: Is Red Elm good for outdoor projects?
  a: No — Red Elm is not naturally durable and is best suited to indoor furniture, cabinetry, and decorative work.
- q: How does Red Elm compare to other Elm species?
  a: Red Elm is slightly harder than American Elm and has a more pronounced reddish colour, but both share the characteristic interlocked grain that resists splitting.
- q: Is Red Elm difficult to work with?
  a: It machines easily overall, but the interlocked grain can cause tearout when planing against the grain. Sharp blades and light passes help manage this.
