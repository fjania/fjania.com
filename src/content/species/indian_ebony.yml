name: Indian Ebony
also_known_as:
- Ceylon Ebony
- East Indian Ebony
scientific: Diospyros melanoxylon
origin: India and Sri Lanka (Coromandel coast of southeastern India)
appearance:
  heartwood: Jet black to dark brown-black, often with reddish-brown, orange, or grey streaks
  sapwood: Pale yellow to pinkish white; sharply demarcated from heartwood
  grain: Straight to slightly irregular or interlocked
  texture: Very fine and uniform with high natural oil content
  luster: High natural lustre; polishes to a deep, rich sheen
properties:
  janka: 3960
  density: 1.24 sg (extremely heavy; sinks in water)
  workability: Difficult with hand tools due to extreme density; carbide tooling recommended
  turning: Excellent — cuts smoothly and holds fine detail
  gluing: Challenging due to natural oils; fresh surfaces and epoxy recommended
  finishing: Superb — takes a glass-like natural polish without topcoat
uses:
- Musical instruments (piano keys, bridges, nuts, fretboards)
- Fine turning (pens, handles, bowls)
- Decorative inlay and marquetry
- Knife handles and tool grips
- Luxury furniture accents
- Carving and sculptural work
advantages:
- Exceptionally hard and durable (3,960 lbf Janka)
- Natural lustre requires minimal finishing
- Outstanding decay and insect resistance
- Fine, uniform texture ideal for detailed work
- Rich colour deepens with age
challenges:
- Extremely hard on cutting tools — carbide essential
- Very expensive and rarely available outside speciality dealers
- Heavy and dense — practical only in smaller pieces
- Dust can cause skin, eye, and respiratory irritation
- Export restrictions from India limit commercial supply
finishing_tips:
- Often needs no applied finish — buff to a mirror sheen
- Use fine sanding grits (600+) for best natural polish
- If a finish is desired, thin oil or wax works best
- Avoid thick film finishes — they mask the natural lustre
buying_tips:
- Sold by the piece or small blank, not by the board foot
- Verify legal sourcing — Indian export restrictions apply
- Turning blanks and pen blanks are the most accessible forms
- Expect significant price variation based on colour uniformity
fun_fact: Indian Ebony leaves (known as tendu or kendu) are more commercially important than the
  timber itself — they are used to wrap bidi cigarettes, a massive cottage industry across rural
  India employing millions of workers.
comparisons:
- title: Indian Ebony vs Gabon Ebony
  rows:
  - Property: Janka Hardness
    Indian Ebony: 3,960 lbf
    Gabon Ebony: 3,080 lbf
  - Property: Colour
    Indian Ebony: Black with brown/orange streaks
    Gabon Ebony: Jet black, uniform
  - Property: Density
    Indian Ebony: 1.24 sg
    Gabon Ebony: 1.03 sg
  - Property: Availability
    Indian Ebony: Very rare
    Gabon Ebony: Rare but more available
  - Property: Primary Use
    Indian Ebony: Turning, inlay, instruments
    Gabon Ebony: Piano keys, inlays
- title: Indian Ebony vs African Blackwood
  rows:
  - Property: Janka Hardness
    Indian Ebony: 3,960 lbf
    African Blackwood: 3,670 lbf
  - Property: Colour
    Indian Ebony: Black with brown streaks
    African Blackwood: Black with violet tones
  - Property: Oiliness
    Indian Ebony: Naturally oily
    African Blackwood: Naturally oily
  - Property: Turning
    Indian Ebony: Excellent
    African Blackwood: Exceptional
  - Property: Price
    Indian Ebony: Very expensive
    African Blackwood: Extremely expensive
faqs:
- q: Is Indian Ebony the same as Ceylon Ebony?
  a: They are closely related but distinct species. Indian Ebony (Diospyros melanoxylon) is also
    called Coromandel Ebony, while Ceylon Ebony (Diospyros ebenum) is native to Sri Lanka. Both
    are traded under the common name Indian Ebony.
- q: Is Indian Ebony legal to buy?
  a: Yes, but India restricts export of raw timber. Purchase from reputable speciality dealers who
    can verify legal sourcing. It is not currently CITES-listed but exports are closely monitored.
- q: Why does my Indian Ebony have brown streaks?
  a: Brown, orange, or reddish streaks are natural and caused by mineral deposits in the heartwood.
    Purely jet-black pieces command a premium, but the streaked figure is prized by many turners
    and craftspeople for its visual interest.
