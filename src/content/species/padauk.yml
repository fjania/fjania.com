name: Padauk
also_known_as:
- African Padauk
- Vermillion
scientific: Pterocarpus soyauxii
origin: Central & West Africa (Cameroon, Nigeria, Congo, Gabon, Angola)
appearance:
  heartwood: Vivid reddish-orange when freshly cut; darkens over time to deep reddish-brown or purplish-brown with UV exposure
  sapwood: Pale yellowish-white, clearly demarcated from heartwood
  grain: Straight to interlocked
  texture: Moderately coarse, open-pored
  luster: Medium natural lustre
properties:
  janka: 1710
  density: 0.72 sg (moderately heavy; ~47 lbs/ft³)
  workability: Easy to work overall; carbide tooling recommended. Tearout can occur on interlocked grain. Excellent natural decay resistance.
  turning: Turns very well; fine finish achievable straight off the tool with minimal sanding
  gluing: Glues well with standard adhesives
  finishing: Open grain absorbs finishes unevenly — careful preparation and multiple coats recommended. Dewaxed shellac preserves the orange colour best. UV-blocking topcoats slow colour change.
uses:
- Furniture & cabinetry
- Flooring & stair treads
- Musical instruments (drums, xylophones)
- Turned objects & decorative carvings
- Tool handles
- Veneer, inlay & marquetry
advantages:
- Stunning vivid reddish-orange colour unlike any other commercial hardwood
- Exceptional durability and natural decay resistance
- Excellent dimensional stability — among the most stable exotic hardwoods
- Natural resistance to termites and insects
- Relatively affordable compared to other exotic hardwoods of similar quality
challenges:
- Colour darkens significantly over time from orange to brown with UV exposure
- Fine oily red dust stains skin, clothes, and surfaces; can cause allergic reactions
- Interlocked grain can cause tearout during planing
- Open grain absorbs finishes unevenly, requiring extra preparation
- Listed under CITES Appendix II — responsible sourcing required
finishing_tips:
- Clear dewaxed shellac preserves the orange colour best; follow with a UV-protective water-based topcoat for maximum colour retention
- Spray light sealer coats first to prevent alcohol-soluble pigment from bleeding onto adjacent lighter woods
- Tung oil darkens the wood initially but shows the least colour change over time during UV exposure
- Keep finished projects out of direct sunlight whenever possible to slow the inevitable darkening
buying_tips:
- Look for boards with the brightest, most vivid orange-red colour — darker boards have already begun oxidising
- Available in wide boards (trees reach 2–4 ft trunk diameter) so generous widths are common
- Check for interlocked grain if you need to plane — straight-grained boards are easier to work
- Buy from reputable dealers who can verify legal and sustainable CITES Appendix II sourcing
fun_fact: When freshly cut, drilled, or turned, Padauk smells distinctly of bubblegum or cotton candy. In its native Africa,
  the bark has been used to produce a bright red dye for body colouring during religious festivals, and the wood is traditionally
  used for drum-making because of its rich, deep tonality and glass-like, overtone-rich ring.
comparisons:
- title: Padauk vs Bloodwood
  rows:
  - Property: Janka Hardness
    Padauk: 1,710 lbf
    Bloodwood: 2,900 lbf
  - Property: Density
    Padauk: Moderately heavy (~47 lbs/ft³)
    Bloodwood: Very heavy (~65 lbs/ft³)
  - Property: Fresh Colour
    Padauk: Vivid reddish-orange
    Bloodwood: Deep, even crimson red
  - Property: Colour Stability
    Padauk: Darkens significantly to brown
    Bloodwood: Much more stable; deepens slowly
  - Property: Workability
    Padauk: Relatively easy to machine
    Bloodwood: Difficult; pronounced blunting effect
  - Property: Price
    Padauk: Moderate
    Bloodwood: Higher
- title: Padauk Colour Change Over Time
  rows:
  - Stage: Freshly Milled
    Colour: Vivid flame orange to reddish-orange
    Notes: Brightest state; appears almost neon
  - Stage: 1–3 Months
    Colour: Coppery amber / darker orange
    Notes: Noticeable shift begins with UV and air exposure
  - Stage: 6–12 Months
    Colour: Deep reddish-brown
    Notes: Significant darkening, especially in direct light
  - Stage: 2+ Years
    Colour: Dark brown to purplish-brown
    Notes: Final stable colour; UV finishes slow but don't prevent this
faqs:
- q: Does Padauk always darken over time?
  a: Yes. All Padauk will eventually darken from vivid orange to deep reddish-brown. UV light and oxidation are the primary
    causes. Dewaxed shellac with a UV-protective topcoat and keeping projects away from direct sunlight can significantly slow
    the process but will not prevent it entirely.
- q: Is Padauk dust harmful?
  a: Padauk dust can cause allergic reactions including swelling of the eyelids and itchy skin. The fine, oily red dust stains
    everything it contacts. Good dust collection and a respirator are strongly recommended when machining Padauk.
- q: Is Padauk sustainable to buy?
  a: African Padauk is listed under CITES Appendix II, meaning international trade is regulated but not banned. Purchase from
    reputable dealers who can document legal, sustainable sourcing. The wood is not currently endangered, but responsible
    purchasing helps ensure continued availability.
