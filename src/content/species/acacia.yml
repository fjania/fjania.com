name: Acacia
also_known_as:
- Wattle
- Australian Blackwood
scientific: Acacia melanoxylon / Acacia spp.
origin: Australia, Southeast Asia, East and South Africa; widely planted in tropical and subtropical regions worldwide
appearance:
  heartwood: Golden brown to dark brown with a slight reddish tinge; often features darker chocolate-brown streaks and growth zones
  sapwood: Pale yellowish-white, clearly demarcated from heartwood
  grain: Generally straight, but frequently interlocked or wavy; quartersawn surfaces can produce attractive fiddleback figure
  texture: Fine to medium and uniform
  luster: Medium to high natural luster
properties:
  janka: 1160
  density: 0.66 sg
  workability: Generally easy to work with hand and machine tools; interlocked grain may cause tearout during planing — reduce cutting angle or use a scraper
  turning: Turns very well; produces sharp arrises and clean curves with good detail retention; sands smoothly on the lathe
  gluing: Glues satisfactorily with standard wood adhesives; freshly machined surfaces bond best
  finishing: Takes stain and finish exceptionally well; oils and varnishes produce a rich, lustrous surface that highlights the grain figure
uses:
- Fine furniture & cabinetry
- Musical instruments (guitars, ukuleles — often compared to Koa)
- Decorative veneers & panelling
- Gunstocks
- Turned objects (bowls, pens, handles)
- Flooring & interior joinery
advantages:
- Beautiful grain figure, especially fiddleback on quartersawn faces — visually similar to Hawaiian Koa at a fraction of the price
- Easy to work, dress, sand, and finish for a hardwood of its density
- Excellent turning wood with clean, sharp detail
- Moderate hardness strikes a good balance between durability and workability
- Bends well with steam, making it suitable for curved components
challenges:
- Interlocked grain can cause tearout during planing if cutting angle is not reduced
- Can experience cupping and warping during drying if boards are not properly restrained
- Dust may cause skin and respiratory irritation in sensitive individuals — use dust collection
- Heartwood is rated non-durable to moderately durable for decay resistance; not ideal for ground-contact outdoor use without treatment
- Availability varies by region — more readily sourced in Australia and Southeast Asia than in North America
finishing_tips:
- Seal end grain before applying stain to prevent blotchiness on figured pieces
- Danish oil or tung oil brings out the depth of colour and grain figure beautifully
- Sand progressively to 320 grit before finishing for the smoothest results
- A shellac wash coat followed by lacquer produces an excellent furniture finish
buying_tips:
- Often marketed simply as "Acacia" — ask the supplier which species (A. melanoxylon, A. mangium, etc.) you are getting
- Quartersawn boards command a premium but showcase the best fiddleback figure
- In North America, look for Australian Blackwood specifically at specialty hardwood dealers for the highest-quality stock
- Expect to pay approximately $8–15 per board foot depending on species, figure, and source
fun_fact: Australian Blackwood (Acacia melanoxylon) is so visually similar to Hawaiian Koa (Acacia koa) that it is
  sometimes called "poor man's Koa." Both are members of the Acacia genus, and luthiers frequently use Blackwood as
  a Koa substitute for guitar backs and sides — producing a strikingly similar tone and appearance at a much lower cost.
comparisons:
- title: Australian Blackwood vs Hawaiian Koa
  rows:
  - Property: Janka Hardness
    Australian Blackwood: 1,160 lbf
    Hawaiian Koa: 1,170 lbf
  - Property: Density
    Australian Blackwood: 0.66 sg (41 lbs/ft³)
    Hawaiian Koa: 0.55 sg (38 lbs/ft³)
  - Property: Heartwood Colour
    Australian Blackwood: Golden to dark brown with chocolate streaks
    Hawaiian Koa: Golden to reddish-brown with dark streaks
  - Property: Grain Figure
    Australian Blackwood: Straight to interlocked; fiddleback common
    Hawaiian Koa: Straight to interlocked; curly figure prized
  - Property: Workability
    Australian Blackwood: Easy to work; finishes well
    Hawaiian Koa: Easy to work; finishes well
  - Property: Price
    Australian Blackwood: Moderate ($8–15/bf)
    Hawaiian Koa: Very expensive ($30–80+/bf)
- title: Acacia vs White Oak
  rows:
  - Property: Janka Hardness
    Acacia: 1,160 lbf (Blackwood)
    White Oak: 1,360 lbf
  - Property: Density
    Acacia: 0.66 sg
    White Oak: 0.68 sg
  - Property: Rot Resistance
    Acacia: Non-durable to moderate
    White Oak: Very durable
  - Property: Grain
    Acacia: Interlocked; fiddleback possible
    White Oak: Straight; prominent ray fleck on quartersawn
  - Property: Steam Bending
    Acacia: Bends well
    White Oak: Excellent — a benchmark for bending
  - Property: Primary Uses
    Acacia: Furniture, instruments, veneers
    White Oak: Furniture, boatbuilding, barrels, flooring
faqs:
- q: Is Acacia wood good for outdoor furniture?
  a: Acacia species like A. mangium are moderately durable and commonly used for outdoor furniture in tropical climates,
    but Australian Blackwood is rated non-durable to moderately durable. For long-lasting outdoor use, apply a quality
    exterior finish and keep the wood off the ground, or choose a more rot-resistant species like Teak or White Oak.
- q: Is Acacia the same as Australian Blackwood?
  a: Australian Blackwood (Acacia melanoxylon) is one species within the large Acacia genus, which contains over 1,000
    species. Lumber sold simply as "Acacia" may be A. mangium, A. auriculiformis, or a plantation hybrid. If species
    identity matters for your project, ask the supplier to confirm exactly which Acacia you are purchasing.
- q: Can Acacia be used as a substitute for Koa in guitars?
  a: Yes. Australian Blackwood is widely used by luthiers as a Koa alternative. The two species are closely related,
    share very similar tonal properties and appearance, and Blackwood costs a fraction of what Koa commands. Many
    high-end guitar makers offer Blackwood as a standard tonewood option.
