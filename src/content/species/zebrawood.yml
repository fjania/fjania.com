faqs:
- q: Is Zebrawood safe to work with?
  a: Zebrawood is classified as a sensitiser. The most common reactions are eye and skin irritation, and the wood produces an
    unpleasant smell during cutting and sanding. Wear a dust mask, eye protection, and work in a well-ventilated area. The
    odour disappears once the wood is sealed with finish.
- q: Can Zebrawood be used outdoors?
  a: The heartwood is rated durable and resistant to insect attack, so it has some outdoor potential. However, its high
    volumetric shrinkage makes it dimensionally unstable, meaning it can warp or crack with humidity swings. It is best suited
    for interior applications or protected outdoor use.
- q: Why do Janka hardness values differ across sources?
  a: Values of 1,575 to 2,090+ lbf all appear in reputable sources. This variation stems from differences in testing standards,
    sample origin, moisture content, and growth conditions. The 1,830 lbf figure is the most widely cited in comprehensive
    lumber references.
