name: Zebrawood
also_known_as:
- Zebrano
- Zingana
scientific: Microberlinia brazzavillensis
origin: West Africa (Cameroon, Gabon, Congo, Equatorial Guinea)
appearance:
  heartwood: Pale golden yellow to light brown with bold dark brown to black streaks resembling zebra stripes; flatsawn produces chaotic wavy patterns, quartersawn yields uniform parallel stripes
  sapwood: Very pale creamy white, clearly distinct from heartwood
  grain: Wavy or interlocked; quartersawn sections required to achieve the signature striped figure
  texture: Medium to coarse with large, open pores
  luster: Moderate natural lustre; polishes to a good sheen with finishing
properties:
  janka: 1830
  density: 0.80 sg (heavy; ~50 lbs/ft³)
  workability: Moderately challenging; saws well but planes poorly due to interlocked grain. Tearout is common. Pre-drilling for fasteners essential due to brittleness. Use sharp tools, light cuts, and skewed planing angles.
  turning: Rewarding but tricky; interlocked grain requires sharp tools and careful technique. Finishes beautifully on the lathe and produces visually striking turned pieces.
  gluing: Glues well with standard woodworking adhesives
  finishing: Finishes well overall; transparent pore filler often necessary due to large open pores. Oil-based finishes (Waterlox, tung oil blends) work particularly well. Sanding sealer or shellac makes an effective base coat.
uses:
- High-end furniture & cabinetry
- Decorative veneers & inlays
- Musical instruments (guitar bodies, bass tops)
- Turned objects (bowls, pens, tool handles)
- Luxury automotive dashboards & interior trim
- Flooring & architectural accents
advantages:
- Exceptionally dramatic and recognisable striped appearance — unlike any other species
- Excellent hardness and durability; heartwood rated durable and resistant to insect damage
- Takes a beautiful finish that highlights the contrasting grain pattern
- Quartersawn boards produce consistent, uniform stripe patterns ideal for bookmatching
- Strong and stiff (high modulus of elasticity) for its weight class
challenges:
- Interlocked grain causes frequent tearout when planing or surfacing — requires careful technique
- Brittle; prone to splintering, especially in veneer form — pilot holes essential for fasteners
- Unpleasant odour during cutting and sanding; dissipates once sealed
- Dimensionally unstable — high volumetric shrinkage; prone to movement in dry climates
- Can cause eye and skin irritation; classified as a sensitiser
finishing_tips:
- Use a transparent pore filler or sanding sealer to address the large open pores before applying topcoats
- Oil/varnish blends (tung oil finish, Waterlox) work exceptionally well — apply 3–4 coats, sanding lightly with 220 grit between
- A shellac sealer coat provides an excellent base under water-based finishes
- CA (cyanoacrylate) glue can be used as a pore filler for a glass-smooth surface on turned pieces
buying_tips:
- Specify quartersawn stock for the classic uniform stripe pattern; flatsawn boards have a more chaotic, wavy figure
- Avoid buttress stock — Zebrawood grows in swampy soil and produces large buttresses that yield inferior lumber
- Expect natural gum pockets and minor checks; these are characteristic of the species, not defects
- The bark can be 6–12 inches thick, adding to processing cost — Zebrawood commands a premium price
fun_fact: Zebrawood has remarkably thick bark — averaging up to 12 inches (30 cm) — which must be stripped from logs at the
  logging site before transport. The species was first recorded in British Customs returns in 1773, when 180 pieces were imported
  from the Mosquito Coast. It was a favoured wood in British furniture-making from roughly 1810 to 1860.
