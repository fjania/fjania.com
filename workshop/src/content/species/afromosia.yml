name: Afromosia
also_known_as:
- African Teak
- Kokrodua
scientific: Pericopsis elata
origin: West & Central Africa (Ghana, Cameroon, Congo)
appearance:
  heartwood: Golden to medium brown with olive or copper undertones
  sapwood: Pale yellow, sharply distinct from heartwood
  grain: Straight to slightly interlocked; ribbon figure on QS
  texture: Fine and uniform with satiny lustre
  luster: Naturally bright and reflective; polishes to soft glow
properties:
  janka: 1570
  density: 0.62 sg (medium-heavy)
  workability: Excellent — planes, sands, and carves cleanly
  turning: Outstanding; crisp edges and high sheen
  gluing: Very good on freshly abraded surfaces
  finishing: Superb — takes oil beautifully and polishes naturally
uses:
- Fine furniture & cabinetry
- Flooring & stairwork
- Exterior architecture
- Boatbuilding
- Decorative millwork
- Turned objects & bowls
advantages:
- Natural decay resistance
- Dimensional stability
- Workability rivalling domestic hardwoods
- Develops rich patina over time
- Easier finishing than Teak (fewer oils)
- Sustainable sourcing available
challenges:
- Higher cost than domestic hardwoods
- Requires fresh surfaces for optimal gluing
- Some boards have interlocked grain
- CITES Appendix II — verify sourcing
finishing_tips:
- Oil finishes bring out natural golden sheen
- Sands to silky smoothness easily
- Avoid heavy film finishes — they mask natural beauty
- Develops richer amber tone over time
buying_tips:
- Select quarter-sawn for ribbon figure
- Inspect sapwood/heartwood contrast
- Source from certified sustainable suppliers
- Compare pricing with Teak — often significantly less
fun_fact: Over time, Afromosia darkens to a richer amber tone, developing a patina that rivals genuine Teak — at a fraction
  of the cost and with easier workability.
comparisons:
