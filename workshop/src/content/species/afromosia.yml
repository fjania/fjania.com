faqs:
- q: Is Afromosia sustainable?
  a: Certified sustainable sources are available. It's CITES Appendix II — always verify sourcing with your supplier.
- q: How does it compare to Teak?
  a: Similar appearance and durability, with easier finishing, better hardness, and lower cost.
- q: Will it darken over time?
  a: Yes — it develops a richer amber patina similar to aged Teak.
