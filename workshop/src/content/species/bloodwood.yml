name: Bloodwood
scientific: Brosimum rubescens
origin: Tropical South America (Brazil, Peru, Venezuela, Colombia, Guyana)
appearance:
  heartwood: Vivid blood-red to deep crimson, sometimes with darker streaks; darkens to brownish-red over time
  sapwood: Pale yellowish-white; rarely seen in commercial lumber
  grain: Generally straight, sometimes slightly interlocked
  texture: Fine and even
  luster: High natural luster; somewhat chatoyant — shimmers and shifts in light
properties:
  janka: 2900
  density: 1.01 sg (very heavy; sinks in water)
  workability: Difficult; extremely dense with pronounced blunting effect on cutters, brittle and prone to splintering
  turning: Turns well despite density; sharp tools produce fine ribbons and exceptional lustrous surfaces
  gluing: Can be problematic due to natural oils; clean surfaces with acetone and use quality adhesive
  finishing: Finishes and polishes exceptionally well; wipe with acetone before applying finish to remove oils
uses:
- Fine furniture & cabinetry
- Decorative inlays & marquetry
- Musical instruments (guitars, woodwinds)
- Turned objects (bowls, pens, handles)
- Jewellery boxes & small decorative items
- Flooring & parquet
advantages:
- Stunning vivid red colour — more stable than most red/orange exotics
- Exceptionally hard and durable (2,900 lbf Janka)
- Very resistant to decay, fungi, and insect attack
- Polishes to a brilliant, lustrous finish with chatoyant shimmer
- Fine, even texture produces smooth surfaces ideal for detail work
challenges:
- Extreme density rapidly dulls cutting tools — carbide tooling essential
- Brittle and prone to splintering, especially at end grain
- Natural oils can interfere with gluing and finishing if surfaces are not degreased
- Expensive and available mainly in narrower boards due to modest trunk diameter
- Can crack if overheated during sanding or machining
finishing_tips:
- Wipe surfaces with acetone before applying any finish to remove natural oils
- Use UV-protective finishes (marine spar varnish, UV-inhibiting lacquer) to slow darkening
- Shellac sealer followed by spray lacquer produces a durable, colour-preserving finish
- CA (cyanoacrylate) finish works exceptionally well for turned pieces and pens
buying_tips:
- Expect to pay approximately $18–20+ per board foot — it is a premium exotic
- Boards tend to be narrow (trunk diameter ~18″) so plan for smaller dimensions or lamination
- Inspect for internal stress — Bloodwood is prone to warping, so acclimate boards before milling
- Buy slightly more than needed — brittleness and splintering can cause waste during machining
fun_fact: When Bloodwood is cut, it produces vivid red dust and sap that indigenous South American peoples historically
  used as dye and face paint. The "blood" in its name comes not just from its colour but from the bright red sap that
  oozes from freshly cut wood — making the tree look like it is literally bleeding.
comparisons:
- title: Bloodwood vs Padauk
  rows:
  - Property: Janka Hardness
    Bloodwood: 2,900 lbf
    African Padauk: 1,880 lbf
  - Property: Density
    Bloodwood: Very heavy (66 lbs/ft³)
    African Padauk: Heavy (47 lbs/ft³)
  - Property: Fresh Colour
    Bloodwood: Vivid blood-red / crimson
    African Padauk: Bright reddish-orange
  - Property: Colour Stability
    Bloodwood: Good — retains red for years
    African Padauk: Poor — browns within months
  - Property: Workability
    Bloodwood: Difficult — dulls tools, splinters
    African Padauk: Moderate — generally easy
  - Property: Price
    Bloodwood: Premium ($18–20+/bf)
    African Padauk: Moderate ($8–12/bf)
- title: Bloodwood Colour Over Time
  rows:
  - Stage: Freshly Milled
    Colour: Bright, vivid blood-red to crimson
    Timeframe: Days
  - Stage: Early Aging
    Colour: Deep red, slightly darker
    Timeframe: 1–6 months
  - Stage: Mature
    Colour: Rich red to deeper brownish-red
    Timeframe: 1–3 years
  - Stage: Aged (unfinished)
    Colour: Brownish-red, still distinctly red
    Timeframe: 5+ years
  - Stage: Aged (UV finish)
    Colour: Preserved deeper red
    Timeframe: Decades
faqs:
- q: Does Bloodwood lose its red colour over time like Padauk?
  a: Bloodwood is significantly more colour-stable than Padauk. While it darkens gradually from vivid red to a deeper
    brownish-red, it retains its fundamental red character for years. A UV-protective finish slows the change further.
- q: Is Bloodwood safe to work with?
  a: The fine red dust can irritate eyes, skin, and lungs — use dust collection and a respirator when machining. The wood
    is not considered highly toxic, but standard exotic-wood dust precautions should be followed.
- q: Can Bloodwood be used for cutting boards?
  a: Its brittleness, high cost, and natural extractives make it impractical as a primary cutting surface. It works well
    as an accent strip in cutting boards alongside more workable species.
