    Colour: Warm golden yellow preserved
    Timeframe: Decades
faqs:
- q: Does Yellowheart lose its bright yellow colour over time?
  a: Yes, Yellowheart gradually shifts from vivid yellow toward golden brown with UV exposure. Using a water-based
    finish with UV inhibitors significantly slows this process. Avoid oil-based finishes, which accelerate darkening.
- q: Is Yellowheart suitable for cutting boards?
  a: Yellowheart works well as an accent wood in cutting boards, paired with species like Walnut or Purpleheart for
    striking contrast. It is food-safe and hard enough for the purpose, though its colour will darken with use and washing.
- q: How does Yellowheart compare to Purpleheart for contrast projects?
  a: They are a classic pairing — the vivid yellow and deep purple create dramatic visual contrast. Both have similar
    Janka hardness (1,790 vs 1,860 lbf) and work well together, though both will shift in colour over time without
    UV-protective finishing.
