name: Yellowheart
scientific: Euxylophora paraensis
origin: Tropical South America (Brazil, Guyana, Suriname)
appearance:
  heartwood: Bright, vivid yellow when freshly cut; gradually deepens to golden yellow or yellow-brown with age and UV exposure
  sapwood: Pale yellowish-white; not always clearly demarcated from heartwood
  grain: Generally straight, occasionally slightly interlocked or wavy
  texture: Fine and even
  luster: High natural luster; surfaces exhibit a satiny sheen, sometimes with subtle chatoyance
properties:
  janka: 1790
  density: 0.84 sg (52 lbs/ft³ — heavy but not extreme)
  workability: Generally easy to work with hand and machine tools; interlocked grain can cause tearout; moderate blunting effect on cutters
  turning: Turns very well; sharp tools produce smooth, lustrous surfaces with fine ribbons
  gluing: Glues well with standard adhesives — no natural oils to interfere with bonding
  finishing: Finishes and polishes exceptionally well; accepts stains evenly due to fine, uniform texture
uses:
- Fine furniture & cabinetry
- Decorative inlays, marquetry & accent strips
- Flooring & parquet
- Turned objects (bowls, pens, handles)
- Boatbuilding & marine trim
- Musical instruments & tool handles
advantages:
- Striking bright yellow colour — one of the few naturally vivid yellow hardwoods
- High natural luster and satiny sheen without any finish
- Easy to work compared to many exotics of similar hardness
- Glues readily with standard wood glues — no oily surface issues
- Good dimensional stability; resistant to warping and movement
challenges:
- Colour fades toward golden brown with UV exposure if not protected
- Interlocked or figured grain can cause tearout during planing
- Moderate blunting effect on cutters — carbide tooling recommended for long runs
- Moderately durable; susceptible to insect attack — not ideal for outdoor use without treatment
- Dust can cause respiratory irritation — use proper dust collection and a respirator
finishing_tips:
- Use water-based finishes with UV inhibitors to preserve the vivid yellow colour as long as possible
- Avoid oil-based finishes — they accelerate yellowing and darkening of the wood
- Sand to at least 320 grit before finishing; the fine texture rewards higher grits with a glass-smooth surface
- CA (cyanoacrylate) finish works exceptionally well for turned pieces and pens
buying_tips:
- Expect to pay approximately $10–15 per board foot — moderately priced for an exotic
- Boards are generally available in reasonable widths and lengths from specialty hardwood dealers
- Inspect for colour consistency — some boards lean more pale or golden depending on the tree
- Buy slightly extra to allow for matching colour across a project, as shade can vary between boards
fun_fact: Yellowheart belongs to the citrus family (Rutaceae), making it a distant relative of oranges and lemons.
  Despite its vivid colour, the yellow pigment is not a dye — it is structural, embedded in the wood's cell walls,
  which is why the colour persists even after extensive sanding and finishing.
comparisons:
- title: Yellowheart vs Osage Orange
  rows:
  - Property: Janka Hardness
    Yellowheart: 1,790 lbf
    Osage Orange: 2,620 lbf
  - Property: Density
    Yellowheart: 52 lbs/ft³
    Osage Orange: 55 lbs/ft³
  - Property: Fresh Colour
    Yellowheart: Bright vivid yellow
    Osage Orange: Golden yellow-orange
  - Property: Colour Stability
    Yellowheart: Fades to golden brown over time
    Osage Orange: Darkens significantly to deep brown
  - Property: Workability
    Yellowheart: Easy — fine texture, straight grain
    Osage Orange: Difficult — very hard, prone to checking
  - Property: Availability
    Yellowheart: Imported exotic (moderate price)
    Osage Orange: Domestic (often free or cheap)
- title: Yellowheart Colour Over Time
  rows:
  - Stage: Freshly Milled
    Colour: Bright, vivid yellow
    Timeframe: Days
  - Stage: Early Aging
    Colour: Rich golden yellow
    Timeframe: 1–6 months
  - Stage: Mature
    Colour: Deep golden to yellow-brown
    Timeframe: 1–3 years
