faqs:
- q: What is the difference between Claro Walnut and Black Walnut?
  a: Claro Walnut (Juglans hindsii) is a distinct species native to California and Oregon, while Black Walnut (Juglans nigra) is from eastern North America. Claro is harder, denser, and far more likely to display dramatic figured grain. It also tends to have a wider colour range with purple, grey, and reddish tones.
- q: Why is Claro Walnut so expensive?
  a: Supply is extremely limited because the trees are no longer commercially planted. Most Claro Walnut on the market comes from salvaged orchard rootstock or urban removals. The spectacular figured pieces are especially rare and command top prices.
- q: Is Claro Walnut good for live-edge tables?
  a: Claro Walnut is considered one of the finest species for live-edge slabs. The dramatic colour variation, figured grain, and natural edge character make it a top choice for statement dining tables and desks.
