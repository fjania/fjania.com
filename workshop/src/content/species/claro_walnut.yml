- title: Claro Walnut vs English Walnut
  rows:
  - Property: Janka Hardness
    Claro Walnut: 1,130 lbf
    English Walnut: 1,220 lbf
  - Property: Heartwood Colour
    Claro Walnut: Variable — pale to dark with colourful streaks
    English Walnut: Light brown to chocolate, more uniform
  - Property: Figure
