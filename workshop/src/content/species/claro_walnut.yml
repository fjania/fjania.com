name: Claro Walnut
scientific: Juglans hindsii
origin: Western United States (California and Oregon)
appearance:
  heartwood: Light pale brown to dark chocolate brown with darker streaks; often shows purple, grey, or reddish cast
  sapwood: Nearly white to pale cream
  grain: Usually straight but can be wildly irregular; frequently figured with curl, burl, or crotch patterns
  texture: Medium to slightly coarse with large earlywood pores grading to medium latewood pores
  luster: Moderate natural lustre
properties:
  janka: 1130
  density: 0.55 sg (40 lbs/ft³)
  workability: Generally easy with hand and power tools; figured grain may cause tearout during planing
  turning: Excellent; cuts cleanly and holds fine detail on the lathe
  gluing: Reliable bonds; glues well without special treatment
  finishing: Accepts oil, shellac, and varnish beautifully; rarely needs stain as natural colour is prized
uses:
- Fine furniture & cabinetry
- Guitar backs & sides and other musical instruments
- Gunstocks
- Veneer & marquetry
- Live-edge slabs & river tables
- Turned bowls & decorative objects
advantages:
- Stunning figured grain patterns (curl, burl, crotch) unmatched by most domestic species
- Rich natural colour palette — no stain needed
- Slightly harder and denser than common Black Walnut
- Excellent dimensional stability once dried
- Takes a superb polish and finish
challenges:
- Significantly more expensive than Black Walnut due to limited supply
- Figured stock is prone to tearout during machining
- Trees are no longer commercially planted, so supply is shrinking
- Wide boards can be difficult to source
- Drying requires care to avoid checking in highly figured pieces
finishing_tips:
- Oil finishes bring out the depth and figure dramatically
- Clear coats preserve the natural colour range and chatoyance
- Sand through grits carefully on figured pieces to avoid scratching across the grain
- Shellac makes an excellent sealer coat before topcoating
buying_tips:
- Figured, burl, and crotch pieces command steep premiums — inspect in person when possible
- Live-edge slabs are a signature use for this species
- Most commercially available Claro Walnut comes from salvaged orchard rootstock
- Ask suppliers whether stock is air-dried or kiln-dried; figured pieces benefit from slow air drying
fun_fact: Claro Walnut trees were originally planted across California as rootstock for English Walnut orchards. When those orchards were removed, woodworkers discovered that the rootstock itself produced some of the most spectacularly figured wood in North America.
comparisons:
- title: Claro Walnut vs Black Walnut
  rows:
  - Property: Janka Hardness
    Claro Walnut: 1,130 lbf
    Black Walnut: 1,010 lbf
  - Property: Density
    Claro Walnut: 40 lbs/ft³
    Black Walnut: 38 lbs/ft³
  - Property: Heartwood Colour
    Claro Walnut: Pale brown to chocolate with purple/grey streaks
    Black Walnut: Rich dark brown to purplish black
  - Property: Figure
    Claro Walnut: Frequently highly figured (curl, burl, crotch)
    Black Walnut: Occasionally wavy or curly
  - Property: Price
    Claro Walnut: Very premium
    Black Walnut: Premium
  - Property: Availability
    Claro Walnut: Limited and shrinking
    Black Walnut: Widely available
  - Property: Origin
    Claro Walnut: California and Oregon
