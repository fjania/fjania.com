name: Redheart
also_known_as:
- Chakte Kok
scientific: Erythroxylum spp.
origin: Southern Mexico through Central America to Paraguay and Brazil
appearance:
  heartwood: Bright watermelon red to deep pinkish-red when freshly cut; darkens to reddish-brown over time with light exposure
  sapwood: Pale yellowish-white; sharply demarcated from heartwood
  grain: Usually straight, sometimes irregular or slightly interlocked
  texture: Fine and even
  luster: Low to medium natural luster
properties:
  janka: 1200
  density: 0.68 sg (42 lbs/ft³)
  workability: Good; moderately dense and easy to work with both hand and power tools, machines and sands well
  turning: Excellent; holds fine detail on the lathe and produces smooth, lustrous surfaces
  gluing: Good; bonds well with standard woodworking adhesives
  finishing: Takes finishes well and polishes to a smooth, lustrous surface; colour can bleed when exposed to water during sanding
uses:
- Turned objects (bowls, pens, bottle stoppers)
- Decorative inlays & marquetry
- Jewellery boxes & small decorative items
- Knife handles & tool handles
- Pool cues & game calls
- Fine furniture accents & cabinetry details
advantages:
- Striking vivid red colour unlike most other wood species
- Fine, even texture produces exceptionally smooth surfaces
- Easy to work and turns beautifully on the lathe
- Moderately hard (1,200 lbf Janka) — durable without being overly difficult to machine
- Readily available from exotic wood suppliers at a reasonable price for an exotic
challenges:
- Colour fades to reddish-brown with UV exposure — requires UV-protective finish
- Can bleed red colour when wet-sanded or exposed to water
- Boards may crack or split if not dried carefully
- Distinct rubber-like odour when machined, which some find unpleasant
- Colour varies significantly from board to board — matching can be difficult
finishing_tips:
- Apply a finish with UV inhibitors (marine spar varnish or UV-inhibiting lacquer) to preserve the red colour
- Avoid water-based finishes during initial coats as the red pigment can bleed
- CA (cyanoacrylate) finish works exceptionally well for turned pieces and pens
- Keep finished pieces away from direct sunlight to slow colour change
buying_tips:
- Expect to pay approximately $10–15 per board foot — moderate for an exotic
- Colour varies widely; hand-select boards in person when possible
- Also sold under the name Chakte Kok, especially from Mexican sources
- Buy extra to account for colour-matching difficulties across boards
fun_fact: Redheart belongs to the genus Erythroxylum — the same genus as the coca plant (Erythroxylum coca).
  Despite this surprising botanical relationship, the wood contains none of the alkaloids found in its infamous
  relative and is used purely for its stunning red colour in woodworking.
comparisons:
- title: Redheart vs Bloodwood
  rows:
  - Property: Janka Hardness
    Redheart: 1,200 lbf
    Bloodwood: 2,900 lbf
  - Property: Density
    Redheart: Moderate (42 lbs/ft³)
    Bloodwood: Very heavy (66 lbs/ft³)
  - Property: Fresh Colour
    Redheart: Bright watermelon red / pink-red
    Bloodwood: Vivid blood-red / crimson
  - Property: Colour Stability
    Redheart: Poor — fades to brown without UV finish
    Bloodwood: Good — retains red for years
  - Property: Workability
    Redheart: Easy — machines and turns well
    Bloodwood: Difficult — dulls tools, splinters
  - Property: Price
    Redheart: Moderate ($10–15/bf)
    Bloodwood: Premium ($18–20+/bf)
- title: Redheart Colour Over Time
  rows:
  - Stage: Freshly Surfaced
    Colour: Bright watermelon red to vivid pink-red
    Timeframe: Days
  - Stage: Early Aging
    Colour: Deeper red, beginning to darken
    Timeframe: 1–3 months
  - Stage: Moderate Aging
    Colour: Muted reddish-brown
    Timeframe: 6–12 months
  - Stage: Aged (unfinished)
    Colour: Dull brownish-red, colour largely lost
    Timeframe: 1–2 years
  - Stage: Aged (UV finish)
    Colour: Preserved warm red, slower fade
    Timeframe: Years
faqs:
- q: Does Redheart stay red over time?
  a: Without protection, Redheart fades from vivid red to a muted reddish-brown within months. A finish with
    UV inhibitors (such as marine spar varnish) significantly slows the colour change but cannot stop it entirely.
    Keeping pieces out of direct sunlight also helps preserve the colour.
- q: Is Redheart safe to work with?
  a: Redheart is generally considered safe, though the fine dust can irritate eyes and lungs as with any hardwood.
    It produces a distinct rubber-like odour when machined. Use dust collection and a respirator as standard
    practice with exotic species.
- q: How does Redheart compare to Padauk for colour?
  a: Both start with vivid reddish tones, but Redheart leans more pink-red while Padauk is more orange-red.
    Both fade over time — Padauk to a dark brown, Redheart to a reddish-brown. Neither holds its colour well
    without UV-protective finishes, though Bloodwood is the superior choice for long-term colour retention.
