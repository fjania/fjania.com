name: Sycamore
also_known_as:
- American Sycamore
- American Plane
- Buttonwood
- Buttonball Tree
- Lacewood (quartersawn)
scientific: Platanus occidentalis
origin: Eastern North America
appearance:
  heartwood: Light reddish brown to tan, often with darker streaks
  sapwood: Whitish to pale yellow, not always clearly demarcated from heartwood
  grain: Interlocked; quartersawn surfaces reveal distinctive ray fleck figure resembling lacewood
  texture: Fine and even
  luster: Moderate natural lustre with a subtle sheen
properties:
  janka: 770
  density: 0.49 sg (medium)
  workability: Generally easy to work, though interlocked grain can cause tear-out during planing and routing; sharp cutters recommended
  turning: Turns well with clean cuts; responds nicely to detail work on the lathe
  gluing: Good adhesion with standard wood glues
  finishing: Accepts finishes adequately, though blotching is possible; pre-stain conditioner or shellac wash coat recommended
uses:
- Furniture & cabinetry
- Decorative veneer & panelling
- Butcher blocks & food containers
- Turned bowls & platters
- Interior millwork & trim
- Cigar boxes & crates
advantages:
- Striking quartersawn lacewood figure sets it apart from most domestic hardwoods
- Readily available and affordably priced
- Fine, even texture takes detail work well
- Good dimensional stability when quartersawn
- Food-safe and odourless, suitable for kitchen items
challenges:
- Interlocked grain can tear out during planing and routing
- Susceptible to fungal staining if not dried promptly
- Flatsawn boards can be plain compared to quartersawn
- Moderate hardness limits high-traffic flooring use
- Can develop surface checking during drying
finishing_tips:
- Use a pre-stain conditioner or shellac wash coat to reduce blotching
- Oil finishes enhance the ray fleck figure on quartersawn surfaces
- Sand to at least 220 grit for a smooth, even finish
- Water-based finishes preserve the pale, natural colour
buying_tips:
- Specify quartersawn for the prized lacewood ray fleck pattern
- Inspect for fungal staining, which appears as dark grey or blue streaks
- Flatsawn stock is significantly cheaper but lacks the distinctive figure
- Look for wide boards to showcase the full ray pattern
fun_fact: Quartersawn Sycamore reveals a stunning lacewood pattern of rice-sized flecks caused by
  the tree's unusually large medullary rays — making an otherwise modest species one of the most
  visually dramatic domestic hardwoods.
comparisons:
- title: Sycamore vs Beech
  rows:
  - Property: Janka Hardness
    Sycamore: 770 lbf
    Beech: 1,300 lbf
  - Property: Colour
    Sycamore: Light tan to reddish brown
    Beech: Pale cream to pinkish
  - Property: Ray Fleck Figure
    Sycamore: Prominent on quartersawn
    Beech: Subtle on quartersawn
  - Property: Workability
    Sycamore: Good — interlocked grain can tear
    Beech: Excellent — straight grain
  - Property: Cost
    Sycamore: Low to moderate
    Beech: Low to moderate
- title: Quartersawn vs Flatsawn Sycamore
  rows:
  - Property: Figure
    Quartersawn: Dramatic lacewood ray flecks
    Flatsawn: Plain, unremarkable grain
  - Property: Stability
    Quartersawn: More dimensionally stable
    Flatsawn: More prone to cupping
  - Property: Cost
    Quartersawn: Higher (premium cut)
    Flatsawn: Lower
  - Property: Visual Appeal
    Quartersawn: Highly decorative
    Flatsawn: Utilitarian
faqs:
- q: Is American Sycamore the same as European Sycamore?
  a: No. American Sycamore (Platanus occidentalis) is a plane tree, while European Sycamore (Acer pseudoplatanus) is actually a maple. They are unrelated species with different properties.
- q: Why is quartersawn Sycamore called Lacewood?
  a: Quartersawing exposes the tree's large medullary rays, creating a pattern of small, repeating flecks that resembles lace. This figure is unique to the quartersawn cut.
- q: Is Sycamore good for cutting boards and kitchen use?
  a: Yes. Sycamore is odourless, tasteless, and food-safe, making it a traditional choice for butcher blocks, food containers, and kitchen utensils.
