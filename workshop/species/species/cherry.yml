name: Cherry
scientific: Prunus serotina
origin: Eastern United States & Southern Canada
appearance:
  heartwood: Light pinkish brown; matures to deep reddish brown
  sapwood: Creamy white to pale yellow
  grain: Straight and fine, with occasional curls or waves
  texture: Smooth and satiny
  luster: Natural lustre with satiny finish
properties:
  janka: 995
  density: 0.50 sg (moderate)
  workability: Excellent; machines smoothly with minimal tear-out
  turning: Cuts cleanly and polishes easily on the lathe
  gluing: Excellent adhesion and holding strength
  finishing: Outstanding; accepts oils, varnishes, and stains evenly
uses:
- Fine furniture & cabinetry
- Architectural millwork & paneling
- Flooring & stair parts
- Turned bowls & platters
- Musical instruments
- Decorative carving
advantages:
- Colour deepens beautifully with age
- Excellent workability — forgiving wood
- Balanced strength-to-weight ratio
- Versatile for traditional & modern design
- Premium appearance at moderate cost
challenges:
- Softer than Oak or Maple (995 lbf Janka)
- Prone to blotching if staining without conditioner
- Colour variation between boards
- Sapwood/heartwood contrast can be dramatic
finishing_tips:
- Always use pre-stain conditioner before staining
- Clear finishes showcase the natural colour evolution
- Oil finishes deepen the warm tones
- UV exposure accelerates the darkening patina
buying_tips:
- Expect colour to darken significantly over time
- Mix boards from same lot for consistent ageing
- Sapwood can be stained to blend or left for contrast
- Select for grain figure if making show pieces
fun_fact: Cherry's colour transformation is one of woodworking's great pleasures — what begins as light pinkish tan gradually
  becomes a deep reddish brown patina over months and years.
comparisons:
- title: Cherry Fresh vs Aged
  rows:
  - Property: Colour
    Fresh Cut: Light pinkish tan
    Aged (1-2 years): Deep reddish brown
  - Property: Lustre
    Fresh Cut: Moderate
    Aged (1-2 years): Rich, warm glow
  - Property: Character
    Fresh Cut: Subtle
    Aged (1-2 years): Dramatic patina
  - Property: UV Effect
    Fresh Cut: Accelerates change
    Aged (1-2 years): Stabilizes over time
- title: Cherry vs Black Walnut
  rows:
  - Property: Janka Hardness
    Cherry: 995 lbf
    Black Walnut: 1,010 lbf
  - Property: Colour
    Cherry: Pinkish → deep red
    Black Walnut: Rich dark brown
  - Property: Workability
    Cherry: Excellent
    Black Walnut: Excellent
  - Property: Weight
    Cherry: Moderate
    Black Walnut: Moderate-heavy
  - Property: Colour Change
    Cherry: Darkens significantly
    Black Walnut: Lightens slightly
faqs:
- q: Why does Cherry change colour?
  a: UV light and oxidation cause natural chemical changes that deepen the pink tones into rich reddish brown.
- q: How do I prevent blotching?
  a: Always apply a pre-stain wood conditioner before staining. Or use a gel stain for more control.
- q: Is Cherry durable enough for furniture?
  a: Absolutely — it's been a premier furniture wood for centuries. It's softer than Oak but more than adequate.
