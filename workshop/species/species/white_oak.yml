name: White Oak
scientific: Quercus alba
origin: North America
appearance:
  heartwood: Light to medium brown with olive or golden undertones
  sapwood: Pale cream to white
  grain: Straight, tight, even; prominent rays when quarter-sawn
  texture: Fine to medium, dense and consistent
  luster: Natural sheen; finishes beautifully in satin or matte
properties:
  janka: 1360
  density: 0.68 sg (heavy)
  workability: Very good with sharp tools; balances hardness with predictability
  turning: Dense, smooth, easy to finish on the lathe
  gluing: Excellent when surfaces are properly prepared
  finishing: Outstanding stain and oil absorption
uses:
- Fine furniture & cabinetry
- Flooring & stair treads
- Doors & architectural trim
- Paneling & millwork
- Barrel staves & boatbuilding
- Turning & decorative accents
advantages:
- Exceptional durability & natural rot resistance
- Neutral colour for classic & modern aesthetics
- Strong and dimensionally stable
- Distinctive ray fleck when quarter-sawn
- Accepts oils, stains, and sealers beautifully
challenges:
- Reacts with ferrous metals (tannin staining)
- Heavier than many domestic hardwoods
- Quarter-sawn stock commands premium pricing
finishing_tips:
- Use water-based or oil-based finishes freely
- Avoid ferrous clamps directly on wet surfaces
- Pre-stain conditioner not typically needed
- Quarter-sawn takes stain more evenly
buying_tips:
- Available flat-sawn and quarter-sawn
- Quarter-sawn offers ray fleck figure and stability
- Check for consistent colour across boards
- 'FAS grade for furniture; #1 Common for character'
fun_fact: White Oak's tyloses make it watertight — that's why it's the only wood suitable for whiskey and wine barrels.
comparisons:
- title: Flat-Sawn vs Quarter-Sawn White Oak
  rows:
  - Property: Grain Pattern
    Flat-Sawn: Cathedral arches
    Quarter-Sawn: Straight lines + ray fleck
  - Property: Stability
    Flat-Sawn: Good
    Quarter-Sawn: Excellent
  - Property: Shrinkage
    Flat-Sawn: More movement
    Quarter-Sawn: Minimal movement
  - Property: Price
    Flat-Sawn: Standard
    Quarter-Sawn: Premium (15-30% more)
  - Property: Best For
    Flat-Sawn: Rustic/traditional
    Quarter-Sawn: Modern/refined
- title: White Oak vs Red Oak
  rows:
  - Property: Janka Hardness
    White Oak: 1,360 lbf
    Red Oak: 1,290 lbf
  - Property: Colour
    White Oak: Olive/golden brown
    Red Oak: Pinkish-red tone
  - Property: Rot Resistance
    White Oak: Excellent (tyloses)
    Red Oak: Poor
  - Property: Grain
    White Oak: Tighter, finer
    Red Oak: More open pores
  - Property: Outdoor Use
    White Oak: 'Yes'
    Red Oak: Not recommended
faqs:
- q: Is White Oak waterproof?
  a: Not waterproof, but its tyloses block liquid penetration, making it water-resistant and ideal for barrels and boats.
- q: Can I use White Oak outdoors?
  a: Yes — it has natural rot resistance and is one of the best domestic hardwoods for exterior use.
- q: White Oak vs Red Oak for furniture?
  a: 'White Oak is more versatile: tighter grain, better rot resistance, and a more neutral colour palette.'
