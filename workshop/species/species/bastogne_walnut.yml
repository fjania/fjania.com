name: Bastogne Walnut
also_known_as:
- Paradox Walnut
scientific: Juglans x paradox (J. hindsii x J. regia)
origin: Western United States (California, Oregon); originally developed by Luther Burbank
appearance:
  heartwood: Warm golden-brown to deep chocolate, often with darker brown or black streaks and occasional green or olive hues; highly variable
  sapwood: Creamy white to pale yellow, often dramatically contrasting with the heartwood
  grain: Usually straight to slightly interlocked; frequently figured with curly, wavy, or marbled patterns
  texture: Medium to fine, generally uniform
  luster: Moderate to high natural luster; figured pieces exhibit striking chatoyance
properties:
  janka: 1250
  density: "0.56 sg (~38 lbs/ft3)"
  workability: Generally easy to work when grain is straight; figured or irregular grain may cause planer tearout — reduce cutting angle or use hand planes
  turning: Excellent; responds beautifully on the lathe, especially figured stock, producing clean surfaces with lustrous depth
  gluing: Glues well with standard PVA or polyurethane adhesives
  finishing: Finishes exceptionally well; accepts oils, lacquers, and film finishes readily — rarely needs staining due to natural colour
uses:
- Fine furniture & live-edge tables
- Gunstocks
- Musical instruments (guitar backs, sides, and bodies)
- Turned objects (bowls, hollow forms, pens)
- Veneer & decorative panels
- Knife handles & small specialty items
advantages:
- Stunning figured grain patterns — curly, marbled, and crotch figures are common
- Harder and denser than either parent species (English or Claro Walnut)
- Rich natural colour with dramatic sapwood-to-heartwood contrast
- Grows faster than parent species, yielding larger and wider boards
- Finishes to a deep, lustrous surface without staining
challenges:
- Figured stock is prone to planer tearout — requires sharp blades and reduced feed rates
- Availability is limited and pricing for figured boards can rival expensive exotics
- Colour and density vary significantly from tree to tree due to hybrid genetics
- Sapwood/heartwood boundary can create uneven drying and movement
- Not widely stocked by mainstream lumber retailers
finishing_tips:
- Oil finishes (Danish oil, tung oil) bring out depth and figure beautifully
- Shellac sealer followed by spray lacquer provides excellent colour clarity
- Rarely needs staining — the natural colour and figure are the primary appeal
- Sand to 320+ grit before finishing to maximise lustre on figured surfaces
buying_tips:
- Pricing varies enormously based on figure quality — plain boards are comparable to Black Walnut; heavily figured stock commands exotic-level prices
- Inspect both faces — Bastogne can have dramatic figure on one side and plain grain on the other
- Buy from specialty West Coast suppliers (California/Oregon) for the best selection
- Acclimate boards slowly before milling — hybrid vigour produces variable moisture content
fun_fact: Bastogne Walnut was originally developed by famed horticulturist Luther Burbank in the
  early 1900s as a rootstock for commercial English Walnut orchards. The hybrid grew so vigorously
  it was nicknamed "Paradox" — and woodworkers later discovered the timber was more beautiful and
  harder than either parent species, turning an agricultural byproduct into a prized tonewood and
  furniture wood.
