- title: Walnut Family Comparison
  rows:
  - Property: Janka Hardness
    Bastogne: 1,250 lbf
    Claro: 1,130 lbf
    Black: 1,010 lbf
  - Property: Typical Figure
    Bastogne: Curly, marbled, crotch
    Claro: Burl, crotch, marbled
    Black: Straight, occasionally figured
  - Property: Heartwood Colour
    Bastogne: Golden-brown to chocolate
    Claro: Light brown to dark chocolate
    Black: Dark brown to purplish
  - Property: Origin
    Bastogne: California/Oregon (hybrid)
    Claro: California/Oregon (native)
    Black: Eastern North America
  - Property: Availability
    Bastogne: Limited
    Claro: Limited
    Black: Widely available
faqs:
- q: Is Bastogne Walnut the same as Paradox Walnut?
  a: Yes. "Paradox" was the original name given by Luther Burbank to the hybrid rootstock.
    "Bastogne Walnut" is the trade name used in the woodworking world to market the lumber,
    though the terms are interchangeable. The botanical name is Juglans x paradox.
- q: Why is figured Bastogne Walnut so expensive?
  a: Bastogne trees are far less common than Black Walnut, and only a fraction produce the
    dramatic curly or marbled figure that woodworkers prize. Supply is limited to salvaged
    orchard trees and a small number of managed stands in California and Oregon, which drives
    prices for premium figured stock to exotic-timber levels.
- q: How does Bastogne Walnut compare to Claro Walnut?
  a: Claro Walnut (Juglans hindsii) is one of Bastogne's parent species. Bastogne is generally
    harder and denser than Claro, grows faster, and tends to produce more consistent figuring.
    Claro is prized for dramatic burl and crotch figure, while Bastogne more often displays
    curly and marbled patterns. Both are California/Oregon species with limited availability.
