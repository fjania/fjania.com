- title: Bastogne Walnut vs Black Walnut
  rows:
  - Property: Janka Hardness
    Bastogne Walnut: 1,250 lbf
    Black Walnut: 1,010 lbf
  - Property: Density
    Bastogne Walnut: ~38 lbs/ft3
    Black Walnut: ~38 lbs/ft3
  - Property: Heartwood Colour
    Bastogne Walnut: Golden-brown to chocolate with streaks
    Black Walnut: Rich dark brown to purplish-brown
  - Property: Figure
    Bastogne Walnut: Frequently figured (curl, marble, crotch)
