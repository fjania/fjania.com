name: Cypress
also_known_as:
- Bald Cypress
- Southern Cypress
- Swamp Cypress
- Gulf Cypress
- Red Cypress
- Yellow Cypress
- White Cypress
scientific: Taxodium distichum
origin: Southeastern United States
appearance:
  heartwood: Light yellowish-brown to honey gold with amber and reddish-brown streaks
  sapwood: Nearly white to pale yellow
  grain: Straight, with occasional interlocking or wavy patterns
  texture: Medium to coarse, with distinct growth rings
  luster: Warm, golden natural glow that develops a silvery-grey patina outdoors
properties:
  janka: 510
  density: 0.46 sg (light to medium)
  workability: Easy to machine, cut, and shape; holds fasteners well; predrill to avoid splitting
  turning: Turns reasonably well with sharp tools; produces clean shavings
  gluing: Good with standard adhesives; lightly roughen surface first as natural oils can reduce bond strength
  finishing: Accepts oils, stains, and sealers readily; takes paint exceptionally well; penetrating oil finishes suit it best
uses:
- Exterior siding and cladding
- Outdoor furniture and garden structures
- Boat building and marine applications
- Interior panelling and trim
- Fencing and posts
- Shingles and shakes
advantages:
- Exceptional natural resistance to rot, decay, and insects
- Outstanding dimensional stability with minimal warping
- Suitable for both interior and exterior applications
- Easy to machine and work with hand and power tools
- Develops beautiful character with age
challenges:
- Limited availability, especially old-growth stock
- Higher cost than comparable softwoods like pine
- Natural oils can complicate gluing if surfaces are not prepared
- Softer than most hardwoods, dents more readily
- Weathers to silvery grey if left unsealed outdoors
finishing_tips:
- Several coats of penetrating oil (clear or tinted) work beautifully for indoor pieces
- For outdoor projects, use a finish with UV protection to preserve the golden colour
- Cypress holds paint exceptionally well, making it ideal for painted exterior trim
- Allow the wood to acclimate and dry thoroughly before applying finish
buying_tips:
- Look for tight, even grain with minimal knots for the best appearance
- Old-growth or sinker cypress is denser and more decay resistant, but commands a premium
- Kiln-dried stock is preferred for interior projects to prevent movement
- Check for the distinctive honey-gold heartwood colour as an indicator of quality
fun_fact: Bald Cypress is one of the few conifers that sheds its needles each autumn, earning it the name
  "bald." Its heartwood contains a natural preservative oil called cypressene, which gives it remarkable
  rot resistance — many cypress structures in the American South have stood for well over a century.
comparisons:
- title: Cypress vs Western Red Cedar
  rows:
  - Property: Janka Hardness
    Cypress: 510 lbf
    Western Red Cedar: 350 lbf
  - Property: Density
    Cypress: 0.46 sg
    Western Red Cedar: 0.32 sg
  - Property: Rot Resistance
    Cypress: Excellent
    Western Red Cedar: Excellent
  - Property: Primary Use
    Cypress: Exterior siding, boats, fencing
    Western Red Cedar: Decking, shingles, fencing
  - Property: Colour
    Cypress: Honey gold to reddish-brown
    Western Red Cedar: Reddish-brown to pinkish
- title: Cypress vs White Pine
  rows:
  - Property: Janka Hardness
    Cypress: 510 lbf
    White Pine: 380 lbf
  - Property: Decay Resistance
    Cypress: Excellent (natural oils)
    White Pine: Poor (requires treatment)
  - Property: Exterior Suitability
    Cypress: Excellent without treatment
    White Pine: Requires preservative treatment
  - Property: Cost
    Cypress: Moderate to high
    White Pine: Low to moderate
  - Property: Availability
    Cypress: Regional (Southeast US)
    White Pine: Widely available
faqs:
- q: Is Cypress good for outdoor use without treatment?
  a: Yes — Cypress heartwood contains natural oils that provide excellent resistance to rot, decay, and insects, making it one of the best untreated options for exterior applications.
- q: How does Cypress compare to pressure-treated lumber?
  a: Cypress offers similar decay resistance without the chemicals. It is lighter, easier to work, and more attractive, though it costs more and is not as widely available.
- q: Does Cypress change colour over time?
  a: Indoors with a finish, it deepens to a warm amber. Left unfinished outdoors, it weathers to a distinctive silvery grey patina, much like cedar.
