name: Wenge
scientific: Millettia laurentii
origin: Central & West Africa (Democratic Republic of Congo, Republic of Congo, Cameroon, Gabon, Equatorial Guinea)
appearance:
  heartwood: Medium to dark chocolate brown with black streaks and veining; freshly cut wood is yellowish-brown but darkens significantly over months to near-black
  sapwood: Pale yellowish-white, clearly demarcated from heartwood
  grain: Straight and even with a distinctive pinstripe effect created by contrasting light and dark lines
  texture: Very coarse with large, open pores
  luster: Low natural lustre
properties:
  janka: 1930
  density: 0.87 sg (very heavy; ~54 lbs/ft³)
  workability: Difficult; very hard with silica content that rapidly dulls tool edges. Splinters easily and sands unevenly due to density variations. Carbide tooling essential.
  turning: Good results with sharp tools and careful technique; popular for segmented turning. Splintering risk requires caution.
  gluing: Can be challenging due to high density and natural oils; light sanding or solvent wipe before gluing improves bond quality
  finishing: Responds well to oil finishes (tung oil, Danish oil) which deepen the dark colour. Water-based poly recommended to retain original colour. Pore filling typically requires two coats.
uses:
- High-end furniture & cabinetry
- Flooring & decking
- Musical instruments (guitar bodies, bass necks, fingerboards)
- Architectural panelling & veneer
- Turned objects & wood sculptures
- Tool handles & specialty items
advantages:
- Exceptional hardness and durability — highly resistant to scratching, abrasion, and denting
- Striking dramatic appearance — dark colour with contrasting grain lines creates a bold, contemporary aesthetic
- Natural rot and decay resistance — rated very durable, resistant to termites and dry-wood borers
- Takes a high polish despite coarse texture
- So recognisable that "wenge" is standardised as a colour name in many design systems
challenges:
- Notorious splintering — splinters are large, painful, and more likely to become infected than other woods
- Health hazards — sawdust causes dermatitis, respiratory irritation, and eye irritation; high-quality dust collection and respirator mandatory
- Rapid tool dulling — high silica content and density blunt cutting edges quickly; carbide tooling essential
- Uneven sanding — density variations between light and dark areas cause uneven surfaces if not carefully managed
- Endangered status — listed as Endangered on the IUCN Red List; ethical sourcing requires FSC/PEFC certification
finishing_tips:
- Oil finishes are preferred — tung oil or Danish oil soak into the pores cleanly and deepen the dark colour without cloudiness
- Use water-based poly to preserve colour — oil-based film finishes can cause excessive darkening or appear cloudy over the large pores
- Double-coat pore filler — the very large open pores cause filler shrinkage; apply two coats with extended curing time
- Seal endgrain early — the coarse, open endgrain absorbs finish unevenly; seal before applying topcoats
buying_tips:
- Source FSC/PEFC certified stock — given Wenge's Endangered status, always verify sustainable sourcing credentials
- Inspect for splinter-prone edges — boards with ragged or poorly milled edges are more hazardous; look for cleanly surfaced stock
- Expect premium pricing — Wenge is significantly more expensive than domestic hardwoods
- Consider Black Walnut as an alternative — for projects where the dark aesthetic is desired but workability and sustainability are priorities
fun_fact: Wenge splinters are uniquely hazardous among all wood species — they cause persistent inflammation and are significantly
  more likely to become infected than splinters from other woods. Woodworkers who regularly work with Wenge report that even small
  splinters can take weeks to heal, making it one of the few timbers where wearing gloves during handling (not just machining) is
  strongly recommended.
comparisons:
- title: Wenge vs Black Walnut
  rows:
  - Property: Janka Hardness
    Wenge: 1,930 lbf
    Black Walnut: 1,010 lbf
  - Property: Density
    Wenge: Very heavy (~54 lbs/ft³)
    Black Walnut: Moderate (~38 lbs/ft³)
  - Property: Colour
    Wenge: Dark brown to near-black
    Black Walnut: Rich chocolate brown
  - Property: Workability
    Wenge: Difficult; dulls tools rapidly
    Black Walnut: Excellent; one of the most workable hardwoods
  - Property: Rot Resistance
    Wenge: Very durable
    Black Walnut: Moderately durable
  - Property: Sustainability
    Wenge: Endangered (IUCN Red List)
    Black Walnut: Widely cultivated, sustainable
- title: Wenge vs Other Dark Hardwoods
  rows:
  - Property: Janka Hardness
    Wenge: 1,930 lbf
    Gaboon Ebony: 3,220 lbf
  - Property: Density
    Wenge: Very heavy (~54 lbs/ft³)
    Gaboon Ebony: Extremely heavy (~69 lbs/ft³)
  - Property: Colour
    Wenge: Dark brown with black streaks
    Gaboon Ebony: Jet black
  - Property: Grain Visibility
    Wenge: High contrast pinstripe
    Gaboon Ebony: Minimal visible grain
  - Property: Price
    Wenge: Premium
    Gaboon Ebony: Very premium
  - Property: Workability
    Wenge: Difficult
    Gaboon Ebony: Very difficult
faqs:
- q: Why does Wenge change colour over time?
  a: Freshly milled Wenge heartwood starts as yellowish-brown, then darkens dramatically over several months to its
    characteristic deep chocolate-brown to near-black hue. This photochemical reaction is accelerated by UV light. Oil-based
    finishes further deepen the darkening effect.
- q: Is Wenge suitable for outdoor use?
  a: Wenge is naturally very durable and resistant to rot, fungal attack, and termite damage, making it suitable for exterior
    applications such as decking. However, it will still weather and grey without a UV-protective finish.
- q: Is Wenge safe for cutting boards or food-contact items?
  a: Generally not recommended. Its coarse, open pores are difficult to keep sanitary, the wood causes allergic reactions in some
    individuals, and the splintering tendency poses a risk.
