name: Soft Maple
also_known_as:
- Red Maple
- Silver Maple
- Bigleaf Maple
- Striped Maple
- Box Elder
scientific: Acer rubrum / Acer saccharinum / Acer macrophyllum
origin: North America
appearance:
  heartwood: Light reddish brown to pale tan; occasionally with darker mineral streaks
  sapwood: Creamy white to pale yellow; often wider than heartwood
  grain: Generally straight with occasional wavy or curly figure
  texture: Fine and even; slightly coarser than Hard Maple
  luster: Moderate natural sheen; brightens with finishing
properties:
  janka: 950
  density: 0.54 sg (medium)
  workability: Very good; machines easily with sharp tools and resists burning better than Hard Maple
  turning: Excellent detail and smooth cuts on the lathe
  gluing: Excellent adhesion with standard wood glues
  finishing: Accepts stains, oils, and clear coats well; does not require fillers for a smooth finish
uses:
- Furniture & cabinetry
- Millwork, mouldings & trim
- Turned bowls & spindle projects
- Doors & interior panelling
- Musical instruments
- Boxes, crates & pallets
advantages:
- Easier to work than Hard Maple with less burning
- More affordable alternative to Hard Maple
- Accepts stain more evenly than Hard Maple
- Lighter weight makes handling and installation simpler
- Available in figured variants (curly, quilted)
challenges:
- Softer than Hard Maple — less suited to high-wear surfaces
- Can dent or scratch in heavy-traffic applications
- Colour variation between heartwood and sapwood
- Occasionally confused with Hard Maple — verify species when buying
- Lower shock resistance than Hard Maple
finishing_tips:
- Pre-stain conditioner helps achieve even colour
- Oil finishes bring out subtle grain character
- Sand to 320+ grit for a glass-smooth surface
- Water-based finishes preserve the natural light colour
buying_tips:
- Specify species (Red Maple, Silver Maple, Bigleaf) if hardness matters
- Select sapwood for a uniform pale appearance
- FAS grade for clear, consistent boards
- Great value alternative to Hard Maple for painted or stained projects
fun_fact: The term "Soft Maple" is a lumber industry grouping, not a single species — it covers every
  North American maple that isn't Sugar Maple or Black Maple, and Red Maple alone is one of the most
  abundant hardwood trees on the continent.
comparisons:
- title: Soft Maple vs Hard Maple
  rows:
  - Property: Janka Hardness
    Soft Maple: 700-950 lbf
    Hard Maple: 1,450 lbf
  - Property: Density
    Soft Maple: 0.47-0.54 sg
    Hard Maple: 0.63 sg
  - Property: Workability
    Soft Maple: Easier to machine; less burning
    Hard Maple: Requires sharper tools
  - Property: Stainability
    Soft Maple: Accepts stain more evenly
    Hard Maple: Can blotch without conditioner
  - Property: Price
    Soft Maple: More affordable
    Hard Maple: Higher
- title: Soft Maple vs Cherry
  rows:
  - Property: Janka Hardness
    Soft Maple: 950 lbf
    Cherry: 995 lbf
  - Property: Colour
    Soft Maple: Pale cream to light reddish brown
    Cherry: Pinkish to deep reddish brown
  - Property: Darkens Over Time
    Soft Maple: Slightly
    Cherry: Significantly
  - Property: Grain Visibility
    Soft Maple: Subtle
    Cherry: Moderate with satiny sheen
  - Property: Best For
    Soft Maple: Painted or stained work
    Cherry: Natural finish showcasing colour
faqs:
- q: What is the difference between Soft Maple and Hard Maple?
  a: Soft Maple is roughly 25% softer and lighter, making it easier to machine and more affordable.
    It accepts stain more evenly but is less durable in high-wear applications like flooring.
- q: Is Soft Maple actually soft?
  a: Not at all — it sits in the medium-hardness range, comparable to Cherry and Black Walnut. The
    name is relative to the exceptionally hard Sugar Maple.
- q: Can I use Soft Maple for cutting boards?
  a: It works for light-duty boards, but Hard Maple is preferred for heavy-use cutting boards
    because of its greater density and wear resistance.
