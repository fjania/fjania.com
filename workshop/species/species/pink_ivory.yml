name: Pink Ivory
scientific: Berchemia zeyheri
origin: Southern Africa (South Africa, Mozambique, Zimbabwe)
appearance:
  heartwood: Pale brownish-pink to vivid neon pink to deep reddish-brown; the most prized pieces are a bright, saturated pink
  sapwood: Pale yellow to light brown, clearly demarcated from heartwood
  grain: Generally straight, occasionally interlocked; sometimes displays curly or fiddleback figure
  texture: Fine and uniform, producing a smooth, porcelain-like surface when polished
  luster: High natural luster with an almost waxy sheen
properties:
  janka: 3230
  density: 0.95 sg (very heavy; sinks in water at ~65 lbs/ft³)
  workability: Difficult; extreme density causes pronounced blunting of cutters — carbide tooling essential. Tearout can occur on interlocked or figured grain during planing.
  turning: Excellent; one of Pink Ivory's strongest suits — turns beautifully and polishes to a brilliant, glassy finish
  gluing: Can be challenging due to high density; lightly scuff mating surfaces and use quality PVA or epoxy for reliable bonds
  finishing: Finishes exceptionally well; tight grain accepts oils, lacquers, and waxes beautifully. Polishes to a porcelain-like sheen. Use UV-protective finishes to slow colour shift.
uses:
- Turned objects (bowls, pens, bottle stoppers, tool handles)
- Pool cues & billiard accessories
- Fine jewellery boxes & decorative items
- Knife handles & custom scales
- Musical instruments & components
- Inlays, marquetry & ornamental woodwork
advantages:
- Stunning, unique pink colour unlike any other commercial timber
- Extremely hard and durable (3,230 lbf Janka)
- Turns and polishes to a brilliant, porcelain-like finish
- Fine, uniform texture ideal for intricate detail work and carving
- Highly resistant to decay and insect attack
challenges:
- Extremely expensive — typically $30–50+ per board foot
- Very rare; supply is limited and harvest is restricted by African governments
- Extreme density rapidly dulls cutting tools — carbide essential
- Seasons very slowly and requires careful drying to prevent checking and cracking
- Colour shifts from vibrant pink toward deeper reddish-brown with prolonged light exposure
finishing_tips:
- Apply UV-protective finishes (spar varnish, UV-inhibiting lacquer) to preserve the pink colour
- Sand through high grits (600–1000+) before finishing — the dense grain rewards extra effort with a glass-like surface
- CA (cyanoacrylate) finish works exceptionally well on turned pieces and pens
- A light coat of Danish oil followed by wax produces a beautiful natural finish that highlights the colour
buying_tips:
- Expect to pay $30–50+ per board foot — it is among the most expensive commercial timbers
- Colour varies dramatically piece to piece; select boards in person or from "what you see is what you get" vendors
- Sold primarily as turning blanks, pen blanks, and small craft pieces rather than full lumber
- Buy from reputable dealers who source sustainably — Pink Ivory harvest is regulated
fun_fact: In Zulu tradition, Pink Ivory was considered a royal wood — only the king and royal family were permitted to possess
  it. Unauthorized possession could reportedly be punished by death, earning it the nickname "the wood of kings." Today it
  remains one of the rarest and most expensive timbers in the world, rivalling African Blackwood in price.
comparisons:
- title: Pink Ivory vs African Blackwood
  rows:
  - Property: Janka Hardness
    Pink Ivory: 3,230 lbf
    African Blackwood: 3,670 lbf
  - Property: Density
    Pink Ivory: Very heavy (65 lbs/ft³)
    African Blackwood: Very heavy (79 lbs/ft³)
  - Property: Colour
    Pink Ivory: Pale pink to vivid neon pink
    African Blackwood: Dark purplish-brown to black
  - Property: Turning
    Pink Ivory: Excellent — polishes beautifully
    African Blackwood: Excellent — polishes beautifully
  - Property: Availability
    Pink Ivory: Very rare, harvest restricted
    African Blackwood: Rare, CITES Appendix II
  - Property: Price
    Pink Ivory: Premium ($30–50+/bf)
    African Blackwood: Premium ($25–40+/bf)
