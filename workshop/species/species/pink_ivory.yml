faqs:
- q: Does Pink Ivory change colour over time?
  a: Yes. With prolonged light exposure, Pink Ivory gradually shifts from bright pink toward a deeper reddish-brown.
    Applying a UV-protective finish and keeping pieces out of direct sunlight significantly slows the change.
- q: Is Pink Ivory endangered or legally restricted?
  a: Pink Ivory is not currently CITES-listed, but several African governments restrict its harvest to prevent
    overexploitation. It is classified as Near Threatened by the IUCN. Always buy from reputable, sustainably-sourced
    dealers.
- q: Can Pink Ivory be used for larger furniture projects?
  a: It is rarely used for full-sized furniture due to extreme cost, limited board sizes, and scarcity. It is best suited
    for turned objects, small decorative items, inlays, and accent pieces where a small amount of wood creates maximum
    visual impact.
