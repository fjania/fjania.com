name: Desert Ironwood
also_known_as:
- Arizona Ironwood
- Palo Fierro
- Palo de Hierro
- Tesota
scientific: Olneya tesota
origin: Sonoran Desert, southwestern United States and northwestern Mexico
appearance:
  heartwood: Deep chocolate-brown to nearly black, mottled with yellowish-red and orange hues; often features purple and black streaks
  sapwood: Pale yellow to cream; sharply demarcated from heartwood
  grain: Variable — straight to wildly interlocked and gnarled due to twisted trunk growth
  texture: Very fine and uniform; naturally dense and tight
  luster: Excellent natural lustre; polishes to a high sheen without finish
properties:
  janka: 3260
  density: 1.10 sg (extremely dense; sinks in water)
  workability: Very difficult — extreme hardness dulls tools quickly; sharp carbide tooling recommended
  turning: Excellent results with sharp tools; scrapes better than it cuts; sand to high grits for best chatoyance
  gluing: Polyurethane or epoxy recommended for reliable bonds; CA glue works well for small projects
  finishing: Superb — so dense it often needs no topcoat; polishes to a mirror-like sheen with buffing
uses:
- Knife handles and gun grips
- Fine turning (pens, bottle stoppers, small bowls)
- Jewellery and decorative carvings
- Accent inlays and marquetry
- Small boxes and keepsake containers
- Bearings and tool handles (historical use)
advantages:
- One of the hardest and densest woods in the world (3,260 lbf)
- Exceptional dimensional stability — virtually no movement in service
- Natural lustre polishes to mirror finish without coatings
- Extremely durable and resistant to decay
- Striking colour and figure with dramatic grain patterns
challenges:
- Extremely hard on cutting tools — carbide or diamond tooling essential
- Available only in small pieces due to small, twisted trees
- Very heavy — impractical for larger projects
- Dust can be irritating — respiratory protection recommended
- Difficult to source — limited availability and often expensive
finishing_tips:
- Often needs no finish at all — buff with white rouge for a natural polish
- Sand progressively to 2000 grit or higher for maximum chatoyance
- CA finish works well for pens and small turnings to prevent dirt buildup
- If a topcoat is desired, use thin oil or wax — thick film finishes are unnecessary
buying_tips:
- Sold as small blanks and turning squares, not board lumber
- Colour varies widely — request photos or hand-pick pieces when possible
- Burl and figured pieces command significant premiums
- Check that pieces are fully seasoned — green ironwood can crack during drying
fun_fact: Desert Ironwood is so dense and resinous that fallen trees in the Sonoran Desert can persist for over 1,600 years without
  decomposing, essentially becoming natural fossils. The wood's toxic compounds make it nearly impervious to insects and decay.
comparisons:
- title: Desert Ironwood vs African Blackwood
  rows:
  - Property: Janka Hardness
    Desert Ironwood: 3,260 lbf
    African Blackwood: 3,670 lbf
  - Property: Colour
    Desert Ironwood: Chocolate-brown with streaks
    African Blackwood: Jet black with violet tones
  - Property: Density (SG)
    Desert Ironwood: "1.10"
    African Blackwood: "1.27"
  - Property: Primary Use
    Desert Ironwood: Knife handles, turning
    African Blackwood: Musical instruments
  - Property: Availability
    Desert Ironwood: Small blanks only
    African Blackwood: Small billets, piece-sold
- title: Desert Ironwood vs Lignum Vitae
  rows:
  - Property: Janka Hardness
    Desert Ironwood: 3,260 lbf
    Lignum Vitae: 4,500 lbf
  - Property: Colour
    Desert Ironwood: Chocolate-brown, mottled
    Lignum Vitae: Olive to dark greenish-brown
  - Property: Oiliness
    Desert Ironwood: Moderate resin content
    Lignum Vitae: Extremely oily
  - Property: Origin
    Desert Ironwood: Sonoran Desert (North America)
    Lignum Vitae: Caribbean and Central America
  - Property: Turning
    Desert Ironwood: Excellent with sharp tools
    Lignum Vitae: Excellent; self-lubricating
faqs:
- q: Is Desert Ironwood endangered?
  a: The tree itself is not formally endangered, but it is protected in parts of Arizona. Harvest is typically limited to
    naturally fallen or dead trees, which helps preserve living populations.
- q: Can I use regular woodworking tools?
  a: Standard high-speed steel tools will dull almost immediately. Carbide-tipped or diamond tools are strongly recommended,
    and expect to sharpen or replace edges frequently.
- q: Why are pieces so small?
  a: Desert Ironwood trees rarely exceed 25 feet tall with trunks up to 18 inches in diameter. The wood is also extremely
    prone to checking, so usable blanks tend to be modest in size.
