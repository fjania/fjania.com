name: Purpleheart
also_known_as:
- Amaranth
- Violetwood
scientific: Peltogyne spp.
origin: Central & South America
appearance:
  heartwood: Grayish-brown freshly cut; oxidizes to bright violet-purple
  sapwood: Pale yellow or gray, narrow and distinct
  grain: Generally straight, occasionally wavy or irregular
  texture: Fine to medium
  luster: Naturally high; silky, reflective surface
properties:
  janka: 2520
  density: 0.86 sg (very heavy; sinks in water)
  workability: Moderate; machines well but dulls blades faster
  turning: Excellent; yields clean edges and glassy finish
  gluing: Reliable with fresh surfaces and quality adhesive
  finishing: Takes oils, varnishes, and waxes superbly
uses:
- Fine furniture & cabinetry
- Turning blanks (bowls, pens, handles)
- Flooring & stair treads
- Instrument parts & inlays
- Decorative panels & accents
- Tables, countertops & art pieces
advantages:
- Vibrant natural colour — no dye needed
- Exceptional hardness (2,520 lbf Janka)
- Impressive dimensional stability
- Striking conversation-piece appearance
- Purple tones last decades with UV protection
challenges:
- Extremely dense — hard on tools
- Dulls cutting edges faster than domestics
- Heat from dull tools can darken colour
- Expensive compared to domestic hardwoods
finishing_tips:
- Keep tools razor-sharp to avoid heat buildup
- Use clear UV-protective finish to preserve purple
- Avoid excessive sanding — heat darkens the wood
- Alcohol-based shellac as sealer works well
buying_tips:
- Source from reputable exotic wood suppliers
- Verify sustainability certifications
- Examine colour consistency before purchase
- Account for extra tool sharpening costs
fun_fact: Purpleheart's colour comes from an oxidation reaction — freshly cut wood is grey-brown, then magically turns vivid
  purple over hours of air exposure.
comparisons:
- title: Purpleheart Colour Stages
  rows:
  - Stage: Fresh Cut
    Colour: Grey-brown
    Timeframe: Minutes
  - Stage: Oxidized
    Colour: Bright violet-purple
    Timeframe: Hours to days
  - Stage: Aged (unfinished)
    Colour: Dark brown-purple
    Timeframe: Years
  - Stage: Aged (UV finish)
    Colour: Rich plum-purple
    Timeframe: Decades
- title: Purpleheart vs Popular Hardwoods
  rows:
  - Property: Janka Hardness
    Purpleheart: 2,520 lbf
    Hard Maple: 1,450 lbf
  - Property: Density
    Purpleheart: Very heavy
    Hard Maple: Heavy
  - Property: Colour
    Purpleheart: Vivid purple
    Hard Maple: Cream/white
  - Property: Workability
    Purpleheart: Moderate (dense)
    Hard Maple: Good
  - Property: Price
    Purpleheart: Premium exotic
    Hard Maple: Moderate domestic
faqs:
- q: What causes Purpleheart's colour change?
  a: Oxidation transforms the grey-brown freshly cut wood to bright violet-purple over hours of air exposure.
- q: Is Purpleheart suitable for beginners?
  a: It requires sharp tools and patience due to extreme density — better for intermediate+ woodworkers.
- q: How long does the purple colour last?
  a: With UV-protective finish, the vibrant purple tones can last for decades.
