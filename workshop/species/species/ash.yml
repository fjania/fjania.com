name: Ash
also_known_as:
- White Ash
- American Ash
scientific: Fraxinus americana
origin: North America
appearance:
  heartwood: Light beige to creamy brown with gentle golden tint
  sapwood: Slightly lighter; blends with heartwood
  grain: Straight, bold, open with cathedral-like patterns
  texture: Medium to coarse; smoother than Oak
  luster: Natural satin glow that brightens with finish
properties:
  janka: 1320
  density: 0.60 sg (medium-heavy)
  workability: Machines, turns, sands, and finishes easily
  turning: Excellent for bowls, pens, and spindle work
  gluing: Excellent adhesion and strong fastener hold
  finishing: Accepts stain exceptionally well; grain filler recommended
uses:
- Furniture & cabinetry
- Table legs & chair frames
- Flooring & stair parts
- Baseball bats & tool handles
- Turned bowls & pens
- Veneers & decorative panels
advantages:
- Exceptional strength-to-weight ratio
- Bold, beautiful cathedral grain
- Versatile finish options — mimics other species
- Sustainably sourced across North America
- Excellent steam-bending properties
challenges:
- Open pores require grain filler for smooth finish
- Supply impacted by Emerald Ash Borer
- Not naturally rot-resistant outdoors
- Can look 'busy' in large flat panels
finishing_tips:
- Use grain filler or pre-sealer for smooth finish
- Takes stain evenly and predictably
- Can mimic Oak, Walnut, or other species with stain
- Oil finishes highlight the bold grain pattern
buying_tips:
- Great value — premium look at domestic pricing
- Choose for projects needing strength without excess weight
- Ideal if you prefer bright, clean aesthetic over Oak
- Source soon — Emerald Ash Borer is reducing supply
fun_fact: Ash has been the wood of choice for baseball bats and axe handles for centuries — its incredible impact resistance
  and natural elasticity make it unmatched for tools that take a beating.
comparisons:
- title: 'Ash: Oil Finish vs Film Finish'
  rows:
  - Property: Grain Feel
    Oil Finish: Natural, tactile
    Film Finish (Poly): Smooth, sealed
  - Property: Pore Filling
    Oil Finish: Minimal
    Film Finish (Poly): Fills with coats
  - Property: Repairability
    Oil Finish: Easy touch-up
    Film Finish (Poly): Requires full resand
  - Property: Best For
    Oil Finish: Rustic/natural look
    Film Finish (Poly): High-wear surfaces
- title: Ash vs Red Oak
  rows:
  - Property: Janka Hardness
    Ash: 1,320 lbf
    Red Oak: 1,290 lbf
  - Property: Colour
    Ash: Light beige-brown
    Red Oak: Pinkish-red tone
  - Property: Grain Pattern
    Ash: Cathedral, bold
    Red Oak: Open, prominent
  - Property: Workability
    Ash: Excellent
    Red Oak: Good
  - Property: Steam Bending
    Ash: Excellent
    Red Oak: Good
faqs:
- q: Is Ash suitable for beginners?
  a: Yes — its excellent workability makes it forgiving for new woodworkers.
- q: Does Ash bend well?
  a: Exceptionally — high shock resistance and elasticity make it ideal for steam bending.
- q: Can Ash replace Oak?
  a: In many applications, yes — with a brighter aesthetic and comparable durability.
