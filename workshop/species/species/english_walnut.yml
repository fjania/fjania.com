name: English Walnut
scientific: Juglans regia
origin: Europe, Western Asia; widely cultivated worldwide
appearance:
  heartwood: Lighter pale brown to dark chocolate brown with darker streaks; occasional grey, purple, or reddish cast
  sapwood: Pale yellow to creamy white
  grain: Usually straight; can be irregular with curly, burl, or fiddleback figure
  texture: Fine to medium with a smooth, even surface
  luster: Moderate natural lustre
properties:
  janka: 1220
  density: 0.55 sg (moderate weight)
  workability: Excellent; cuts, planes, sands, and carves smoothly with hand and power tools
  turning: Very good; produces clean cuts and holds detail well
  gluing: Glues reliably with strong bonds
  finishing: Accepts oil, lacquer, and varnish beautifully; develops a rich sheen
uses:
- Fine furniture & cabinetry
- Gunstocks (prized for figured blanks)
- Interior panelling & millwork
- Veneer & marquetry
- Turned bowls & decorative objects
- Musical instruments
advantages:
- Lighter, warmer colour palette than Black Walnut
- Stunning figured grain patterns (curly, burl, fiddleback)
- Excellent workability — easy to machine and carve
- Good dimensional stability
- Highly prized for gunstock blanks worldwide
challenges:
- Less readily available than Black Walnut in North America
- Premium pricing, especially for figured stock
- Colour can be inconsistent between boards
- Moderately durable; susceptible to insect attack
- Sapwood contrast requires careful board selection
finishing_tips:
- Oil finishes enhance the warm brown tones and figure
- Clear coats preserve the lighter colour beautifully
- No pre-stain conditioner typically needed
- Danish oil or tung oil are classic choices for this species
buying_tips:
- Figured stock (curly, burl, fiddleback) commands significant premiums
- Often sold as gunstock blanks — check specialty dealers
- Wetting the surface reveals true finished colour
- European suppliers may label it simply as Walnut
fun_fact: English Walnut has been cultivated for over 4,000 years, making it one of the oldest known tree crops. Despite
  its name, it actually originates from Persia (modern-day Iran) and Central Asia — the "English" label came about because
  English merchants were the primary traders who brought it to the Americas.
comparisons:
- title: English Walnut vs Black Walnut
  rows:
  - Property: Janka Hardness
    English Walnut: 1,220 lbf
    Black Walnut: 1,010 lbf
  - Property: Heartwood Colour
    English Walnut: Lighter brown with grey/purple hints
    Black Walnut: Rich dark brown to purplish black
  - Property: Sapwood
    English Walnut: Pale yellow to creamy white
    Black Walnut: Pale cream to light grey
  - Property: Grain
    English Walnut: Straight to irregular; often figured
    Black Walnut: Generally straight; occasionally wavy
  - Property: Price
    English Walnut: Premium (especially figured)
    Black Walnut: Premium domestic
  - Property: Availability
    English Walnut: Less common in North America
    Black Walnut: Widely available in North America
- title: English Walnut vs Cherry
  rows:
  - Property: Janka Hardness
    English Walnut: 1,220 lbf
    Cherry: 995 lbf
  - Property: Heartwood Colour
    English Walnut: Warm brown with darker streaks
    Cherry: Pinkish brown, darkens to deep red
  - Property: Grain
    English Walnut: Straight to figured
    Cherry: Straight and fine
  - Property: Finishing
    English Walnut: Excellent; rich sheen
    Cherry: Excellent; may blotch with stain
  - Property: Price
    English Walnut: Premium
    Cherry: Moderate
faqs:
- q: What is the difference between English Walnut and Black Walnut?
  a: English Walnut is lighter in colour with warm brown tones, slightly harder (1,220 vs 1,010 lbf), and more commonly
    features dramatic figured grain. Black Walnut is darker and more readily available in North America.
- q: Why is English Walnut so popular for gunstocks?
  a: Its moderate weight, excellent dimensional stability, beautiful figure patterns, and superb workability make it
    the gold standard for fine gunstocks worldwide.
- q: Is English Walnut actually from England?
  a: No. It originates from Persia and Central Asia. English merchants popularised it across Europe and the Americas,
    hence the name. It is also called Persian Walnut or Common Walnut.
