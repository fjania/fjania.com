name: Tulipwood
scientific: Dalbergia frutescens
origin: Northeastern Brazil (Bahia region)
appearance:
  heartwood: Cream to salmon-yellow base with vivid striping in shades of pink, rose, red, violet, and purple — often compared to candy cane
  sapwood: Pale yellowish-white, clearly demarcated from the heartwood
  grain: Typically straight, occasionally wavy or irregular
  texture: Fine and uniform
  luster: High natural luster; polishes to a brilliant, glossy surface
properties:
  janka: 2500
  density: 0.97 sg (very heavy; approximately 60 lbs/ft³)
  workability: Extremely difficult — very dense with severe blunting effect on cutting edges; prone to splitting after sawing; pre-boring required for nailing
  turning: Excellent — despite extreme density, turns beautifully and produces superb lustrous surfaces with sharp tools
  gluing: Generally good with clean, freshly prepared surfaces; natural oils can occasionally interfere
  finishing: Outstanding — takes an exceptionally high natural polish; sands very smooth despite open pores
uses:
- Turned objects (pens, bowls, handles, bottle stoppers)
- Decorative inlays & marquetry
- Jewellery boxes & small decorative items
- Musical instruments (marimbas, guitar components)
- Fine furniture accents & cabinetry details
- Knife scales & brush backs
advantages:
- Extraordinarily striking colour and figure — one of the most visually dramatic woods in the world
- Takes a brilliant, glass-like polish with minimal effort
- Very hard and durable (2,500 lbf Janka)
- Pleasant, mildly fragrant scent when freshly cut
- Excellent for turning despite extreme density
challenges:
- Severe blunting effect on cutting tools — carbide tooling essential
- Prone to splitting after sawing; boards tend to be very narrow (2–5 inches typical)
- Small tree/shrub means limited stock sizes and high prices
- Listed on CITES Appendix II (all Dalbergia species) — restricts international trade and requires documentation
- Heartwood colour gradually fades with prolonged UV exposure
finishing_tips:
- Sand through progressively fine grits (to 600+) to achieve Tulipwood's signature glass-like polish
- Use UV-protective finishes (marine spar varnish, UV-inhibiting lacquer) to slow colour fading
- CA (cyanoacrylate) finish works exceptionally well on turned pieces and pens
- Wipe surfaces with acetone or naphtha before finishing to remove any surface oils
buying_tips:
- Expect very high prices — Tulipwood is one of the most expensive rosewoods, typically sold as small turning blanks and pen blanks rather than boards
- Average usable width is only 2–3 inches due to the small trunk diameter and prominent central pith defect
- CITES Appendix II listing means you may need documentation for purchase and especially for international shipping
- Buy slightly more than needed — the wood is prone to splitting and narrow stock can be difficult to work efficiently
fun_fact: Tulipwood gets its common name not from the tulip tree but from its resemblance to the colourful
  petals of a tulip flower. Despite being a member of the rosewood (Dalbergia) genus, it looks nothing
  like typical rosewood — its wild pink, salmon, and violet striping on a cream background has earned it
  the nickname "Candy Cane Rosewood" among woodturners.
comparisons:
- title: Tulipwood vs Kingwood
  rows:
  - Property: Janka Hardness
    Tulipwood: 2,500 lbf
    Kingwood: 3,340 lbf
  - Property: Density
    Tulipwood: Very heavy (60 lbs/ft³)
    Kingwood: Very heavy (75 lbs/ft³)
  - Property: Colour
    Tulipwood: Cream/salmon with pink, rose, and violet stripes
    Kingwood: Dark violet-brown with black streaks
  - Property: Typical Stock Size
    Tulipwood: Narrow — 2–5 inch widths
    Kingwood: Narrow — 2–4 inch widths
  - Property: Price
    Tulipwood: Very expensive
    Kingwood: Very expensive
  - Property: CITES Status
    Tulipwood: Appendix II (all Dalbergia)
    Kingwood: Appendix II (all Dalbergia)
- title: Tulipwood Colour Over Time
  rows:
  - Stage: Freshly Milled
    Colour: Vivid pink, rose, and violet stripes on cream/salmon base
    Timeframe: Days
  - Stage: Early Aging
    Colour: Colours begin to mellow slightly
    Timeframe: 1–6 months
  - Stage: Mature
    Colour: Stripes fade toward muted rose and tan
    Timeframe: 1–3 years
  - Stage: Aged (unfinished)
    Colour: Significantly faded; more uniform brownish-rose tone
    Timeframe: 5+ years
  - Stage: Aged (UV finish)
    Colour: Preserved vibrant stripes, mellowed slightly
    Timeframe: Decades
faqs:
- q: Is Brazilian Tulipwood the same as Tulip Poplar?
  a: No — they are completely different species. Brazilian Tulipwood (Dalbergia frutescens) is a dense, expensive
    exotic rosewood from Brazil. Tulip Poplar (Liriodendron tulipifera) is a soft, inexpensive domestic hardwood
    from eastern North America. They share nothing but a common name.
- q: Is Brazilian Tulipwood legal to buy and sell?
  a: Yes, but with restrictions. All Dalbergia species are listed on CITES Appendix II, which means international
    trade requires permits and documentation. Domestic sale within a country is generally unrestricted, but keep
    receipts and documentation to prove legal sourcing.
- q: Why is Tulipwood so expensive and only available in small sizes?
  a: Tulipwood grows as a small tree or shrub in northeastern Brazil, typically reaching only 2–10 inches in
    diameter without sapwood. The prominent central pith defect further limits usable width to just 2–3 inches
    on average. Combined with CITES restrictions and high demand for its extraordinary figure, prices are among
    the highest of any wood species.
