faqs:
- q: Is Goiabao the same as Tigerwood (Goncalo Alves)?
  a: No. Despite both being Brazilian hardwoods, they are entirely different species from different families. Goiabao (Pouteria
    pachycarpa, Sapotaceae) is a pale yellow wood with fiddleback figure. Tigerwood (Astronium graveolens, Anacardiaceae) is a
    reddish-brown wood with dramatic dark striping.
- q: Is Goiabao suitable for outdoor use?
  a: Not without treatment. Goiabao has poor to moderate natural durability against decay organisms. It is best suited for
    interior applications such as furniture, panelling, and veneer.
- q: Why is Goiabao sometimes called "Brazilian Maple"?
  a: The name comes from its pale cream-to-yellow colour and clean grain, which can resemble Hard Maple. However, Goiabao is
    significantly denser and harder than Hard Maple, and the two are botanically unrelated.
