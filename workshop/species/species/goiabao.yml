name: Goiabao
also_known_as:
- Abiurana
- Brazilian Maple
- Kimboto
scientific: Pouteria pachycarpa
origin: Brazil (Amazon and Tocantins river basins)
appearance:
  heartwood: Straw yellow to yellowish-brown, sometimes with greyish-brown tones; very uniform in colour with occasional orange or green tinges
  sapwood: White to yellow, not clearly demarcated from heartwood
  grain: Straight to slightly interlocked
  texture: Fine to medium, even
  luster: Good natural lustre; frequently displays heavy, consistent fiddleback figuring, particularly in quarter-cut stock
properties:
  janka: 3420
  density: 0.91 sg (very heavy; ~56 lbs/ft³)
  workability: Easy to saw and plane despite high density. Slight to moderate blunting effect on cutting tools. Pre-boring required for nailing as the wood tends to split.
  turning: Good; fine, even texture produces clean turned surfaces
  gluing: Easy to glue; joints hold well
  finishing: Excellent finish quality; accepts stains and finishes well. Shows very little grain structure after surface finishing, producing a smooth, polished appearance.
uses:
- Fine furniture & cabinetwork
- Flooring
- Interior panelling & architectural millwork
- Decorative veneer (especially fiddleback figure)
- Turned goods & tool handles
- Heavy construction & shipbuilding
advantages:
- Stunning fiddleback figure frequently available, especially in quarter-cut
- Very fine, even texture produces excellent surface finish
- Easy to saw, plane, and glue despite high density
- High structural strength suitable for demanding applications
- Uniform colour provides clean, elegant appearance
challenges:
- Prone to warping during seasoning — requires careful drying
- Tends to split when nailing; pre-boring required
- Poor to moderate natural durability; not suitable for exterior use without treatment
- High tangential shrinkage (~11.4%) means significant wood movement
- Limited commercial availability outside specialty suppliers
finishing_tips:
- The fine texture finishes to a smooth, polished surface with minimal grain filling needed
- Oil and stain may not absorb readily — use a wood conditioner or thin first coat
- The uniform pale colour takes dye well and is often dyed for aesthetic purposes
- Film-building finishes (lacquer, polyurethane) perform well on this dense wood
buying_tips:
- Available from Woodcraft as dimensional lumber in small sizes
- Widely available as decorative veneer (especially fiddleback/figured) from veneer suppliers
- Look for quarter-sawn stock to maximise the characteristic fiddleback figure
- Trees are relatively small, so wide boards are uncommon
fun_fact: Goiabao's name comes from the Portuguese word "goiaba" (guava), referencing the tree's fruit which resembles a guava.
  Despite its Brazilian Amazon origins, this wood is most prized in the veneer world for its striking fiddleback figure that
  rivals European Sycamore — it is sometimes called the "figured Anigre of the Amazon."
comparisons:
- title: Goiabao vs Hard Maple
  rows:
  - Property: Janka Hardness
    Goiabao: 3,420 lbf
    Hard Maple: 1,450 lbf
  - Property: Density
    Goiabao: Very heavy (~56 lbs/ft³)
    Hard Maple: Heavy (~44 lbs/ft³)
  - Property: Colour
    Goiabao: Straw yellow to yellowish-brown
    Hard Maple: Creamy white
  - Property: Figure
    Goiabao: Fiddleback common
    Hard Maple: Occasional figure
  - Property: Durability
