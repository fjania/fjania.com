name: Hard Maple
also_known_as:
- Sugar Maple
- Rock Maple
scientific: Acer saccharum
origin: North America
appearance:
  heartwood: Cream to light reddish brown with warm golden tone
  sapwood: Nearly white to pale cream; often preferred for uniform look
  grain: Generally straight; occasional curly, wavy, or birdseye figure
  texture: Fine and even; glass-like surfaces when sanded
  luster: Naturally bright and reflective
properties:
  janka: 1450
  density: 0.63 sg (heavy and strong)
  workability: Excellent with sharp tools; dull blades cause burning
  turning: Produces crisp detail and clean edges on the lathe
  gluing: Very good when pre-drilled; tight bonds
  finishing: Outstanding; accepts oils and clear coats evenly
uses:
- Furniture & cabinetry
- Cutting boards & butcher blocks
- Flooring & stair treads
- Wood turning projects
- Musical instruments
- Bowling lanes & gym floors
advantages:
- Exceptional density and wear resistance
- Fine grain for ultra-smooth finishes
- Uniform appearance (sapwood)
- Versatile for modern & traditional styles
- Available with figured variants (curly, birdseye)
challenges:
- Hardness requires consistently sharp tools
- Dull blades cause burning or tear-out
- Can be difficult to stain evenly
- Heavy — plan for weight in large projects
finishing_tips:
- Use pre-stain conditioner if staining
- Oil finishes give a warm, natural look
- Sand to 320+ grit for glass-like surface
- Water-based finishes keep colour light
buying_tips:
- Select sapwood for uniform light appearance
- Consider figured variants for decorative pieces
- Prioritize sharp tooling before starting
- FAS grade for clear, consistent boards
fun_fact: Hard Maple is the same wood found in classic bowling lanes, gym floors, and professional-grade cutting boards —
  it thrives under punishment.
comparisons:
- title: Hard Maple vs Soft Maple
  rows:
  - Property: Janka Hardness
    Hard Maple: 1,450 lbf
    Soft Maple: 700–950 lbf
  - Property: Density
    Hard Maple: Higher
    Soft Maple: Lower
  - Property: Grain
    Hard Maple: Tighter, finer
    Soft Maple: Slightly coarser
  - Property: Workability
    Hard Maple: Needs sharp tools
    Soft Maple: Easier to work
  - Property: Price
    Hard Maple: Higher
    Soft Maple: More affordable
- title: Hard Maple vs Cherry
  rows:
  - Property: Janka Hardness
    Hard Maple: 1,450 lbf
    Cherry: 995 lbf
  - Property: Colour
    Hard Maple: Pale cream/white
    Cherry: Pinkish to deep red
  - Property: Grain Visibility
    Hard Maple: Subtle
    Cherry: Moderate
  - Property: Darkens Over Time
    Hard Maple: Slightly
    Cherry: Significantly
  - Property: Best For
    Hard Maple: Modern/clean look
    Cherry: Warm/traditional
faqs:
- q: What's the difference between Hard and Soft Maple?
  a: Hard Maple (Sugar Maple) is denser, harder, and more wear-resistant. Soft Maple is easier to work but less durable.
- q: Why does Hard Maple burn when cutting?
  a: Its density creates friction — always use sharp blades and appropriate feed rates.
- q: Is Hard Maple good for beginners?
  a: It's forgiving in design but demands sharp, well-maintained tools.
