name: Black Walnut
scientific: Juglans nigra
origin: Eastern North America
appearance:
  heartwood: Rich dark brown to purplish black; deepens with age
  sapwood: Pale cream to light grey
  grain: Generally straight; occasionally wavy or curly
  texture: Fine and even with natural lustre
  luster: Natural lustre under finish
properties:
  janka: 1010
  density: 0.55 sg (moderately heavy)
  workability: Excellent; planes, sands, turns, and glues effortlessly
  turning: Performs beautifully for bowls and lathe projects
  gluing: Responds well; reliable bonds
  finishing: Accepts oil, shellac, and varnish flawlessly without blotching
uses:
- Fine furniture & cabinetry
- Gunstocks & musical instruments
- Architectural millwork & wall panels
- Veneer & marquetry
- Turned bowls & lathe projects
- Custom tables & countertops
advantages:
- Striking natural dark colour — no stain needed
- Dramatic heartwood/sapwood contrast
- Machines cleanly and holds fine detail
- Stable and durable
- Premium appearance prized worldwide
challenges:
- Premium pricing — most expensive domestic hardwood
- Narrower boards (smaller trees)
- Sapwood waste if uniform colour needed
- Can stain hands and clothes
finishing_tips:
- Clear coats showcase natural beauty best
- Oil finishes deepen the rich brown tones
- No pre-stain conditioner needed — won't blotch
- Danish oil is a classic Walnut finish
buying_tips:
- Curly, crotch, or burl variants command premiums
- Sapwood contrast is desirable for visual impact
- Steamed Walnut has more uniform (lighter) colour
- Live edge slabs are spectacular in this species
fun_fact: Black Walnut is one of the only domestic North American species with naturally dark heartwood — most 'dark' furniture
  woods get their colour from stain.
comparisons:
- title: Steamed vs Unsteamed Walnut
  rows:
  - Property: Heartwood
    Steamed: More uniform brown
    Unsteamed (Natural): Rich dark brown to purple
  - Property: Sapwood
    Steamed: Blends more
    Unsteamed (Natural): Sharp cream contrast
  - Property: Character
    Steamed: Consistent
    Unsteamed (Natural): More dramatic
  - Property: Typical Use
    Steamed: Production furniture
    Unsteamed (Natural): Show pieces
- title: Black Walnut vs Cherry
  rows:
  - Property: Janka Hardness
    Black Walnut: 1,010 lbf
    Cherry: 995 lbf
  - Property: Colour
    Black Walnut: Dark brown/purple
    Cherry: Pink → deep red
  - Property: Grain
    Black Walnut: Straight, fine
    Cherry: Straight, fine
  - Property: Price
    Black Walnut: Premium
    Cherry: Moderate
  - Property: Stain Needed
    Black Walnut: 'No'
    Cherry: No (colour develops)
faqs:
- q: Why is Black Walnut so expensive?
  a: Smaller trees, slower growth, and worldwide demand for its unique dark colour drive premium pricing.
- q: Does Walnut darken or lighten over time?
  a: Unlike most woods, Walnut actually lightens slightly over years of UV exposure.
- q: Steamed vs natural Walnut?
  a: Steaming blends sapwood/heartwood colour for uniformity. Natural has more dramatic contrast.
