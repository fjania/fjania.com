name: Morado
scientific: Machaerium scleroxylon
origin: Tropical South America (Brazil, Bolivia)
appearance:
  heartwood: Reddish-orange to dark violet-brown with contrasting darker black streaks; shades of yellow, brown, red, orange, and violet intermixed. Lightens considerably over time to a golden tan.
  sapwood: Pale yellow, clearly distinct from heartwood
  grain: Straight to irregular; can be wavy or interlocked, producing attractive figure
  texture: Fine to medium, uniform
  luster: Medium to high natural lustre; takes a high polish
properties:
  janka: 1960
  density: 0.85 sg (very dense; ~53 lbs/ft³)
  workability: Machines well overall — cuts cleanly with carbide-tipped blades without burning. Responds well to routing and planing, though accelerates cutter wear. Irregular grain can cause tearout.
  turning: Turns very well; takes a smooth finish on the lathe
  gluing: Natural oils complicate gluing; glue joints immediately after cutting or wipe with acetone before applying adhesive
  finishing: Takes a smooth finish and high polish. Oil finishes pop the grain and boost rich colour. Use dewaxed shellac as a sealer before water-based or urethane topcoats to prevent conflicts with natural oils.
uses:
- Fine furniture & cabinetry
- Musical instrument components (fretboards, backs, sides)
- Decorative veneers
- Turned objects (bowls, vessels, pens)
- Flooring
- Cutting boards & kitchen accessories
advantages:
- Stunning appearance — dramatic colour variation and swirling grain; each piece is unique
- Excellent hardness and durability — Janka 1,960 lbf with high resistance to decay and fungi
- Sustainable alternative — not CITES-listed; serves as a responsible substitute for endangered Brazilian Rosewood
- Versatile finishing — accepts oils, lacquers, and water-based finishes beautifully
- Good dimensional stability once properly dried
challenges:
- Dulls tools quickly — very dense wood accelerates cutter wear; keep blades and bits sharp
- Gluing difficulties — natural oils interfere with adhesives; requires immediate gluing or acetone wiping
- Colour change over time — lightens considerably from dark brown to golden tan with UV exposure
- Limited board widths — logs are small, typically producing lumber only 3–6 inches wide
- Sensitiser — reported to cause eye and skin irritation; use dust collection and PPE
finishing_tips:
- Oil finishes are ideal for popping grain — apply tung oil, boiled linseed oil, or Danish oil in thin coats, allowing full drying between
- Seal before film finishes — apply dewaxed shellac before water-based polyurethane or lacquer to prevent oil interference
- Avoid pure oil-based polyurethanes directly on bare wood — they may not dry properly due to the wood's oil content
- Sand progressively to at least 320 grit before finishing; the wood's density rewards patience with a glass-smooth surface
buying_tips:
- Expect significant colour variation between boards — pieces range from light tan-brown to deep violet-brown
- Budget for narrow widths — most boards run 3–6 inches wide; wider stock commands a premium
- Falls in the medium range for exotic hardwoods — far cheaper than scarce true rosewoods (Dalbergia species)
- Ensure kiln-dried stock at 6–8% MC; inspect boards for existing checks as the wood is prone to checking during drying
fun_fact: '"Pau Ferro" translates loosely from Portuguese as "ironwood" — a fitting name for a timber that is roughly 52% harder
  than Red Oak. Fender guitars famously switched from East Indian Rosewood to Pau Ferro for their fretboards after CITES
  restrictions tightened on Dalbergia species in 2017, making Morado one of the most visible exotic hardwoods in the music world.'
comparisons:
- title: Morado vs East Indian Rosewood
  rows:
  - Property: Janka Hardness
    Morado: 1,960 lbf
    East Indian Rosewood: 2,440 lbf
  - Property: Density
    Morado: Very dense (~53 lbs/ft³)
    East Indian Rosewood: Dense (~52 lbs/ft³)
  - Property: Colour
    Morado: Reddish-orange to violet-brown with black streaks
    East Indian Rosewood: Golden brown to purplish-brown with darker streaks
  - Property: CITES Status
    Morado: Not listed (Least Concern)
    East Indian Rosewood: Appendix II (Vulnerable)
  - Property: Price
    Morado: Moderate
    East Indian Rosewood: High (restricted supply)
  - Property: Oil Content
    Morado: Moderate
    East Indian Rosewood: High
- title: Woods Called "Rosewood" — The Name Confusion
  rows:
  - Common Name: Morado / Bolivian Rosewood
    Genus: Machaerium
    True Rosewood: 'No'
    CITES: Not listed
  - Common Name: Brazilian Rosewood
    Genus: Dalbergia
    True Rosewood: 'Yes'
    CITES: Appendix I (banned)
  - Common Name: East Indian Rosewood
    Genus: Dalbergia
    True Rosewood: 'Yes'
    CITES: Appendix II
  - Common Name: Cocobolo
    Genus: Dalbergia
    True Rosewood: 'Yes'
    CITES: Appendix II
faqs:
- q: Is Morado the same as rosewood?
  a: No. Despite trade names like "Bolivian Rosewood" and "Santos Rosewood," Morado belongs to the genus Machaerium, not
    Dalbergia (the true rosewood genus). It shares a similar appearance and working properties with true rosewoods, but its
    different botanical classification means it is not subject to the same CITES trade restrictions.
- q: Will Morado change colour over time?
  a: Yes. Fresh Morado is typically dark violet-brown, but it lightens considerably with UV exposure, shifting toward a golden
    tan. A UV-protective finish can slow this process but will not prevent it entirely.
- q: Is Morado safe for cutting boards?
  a: Morado is commonly used for cutting boards and serving pieces. It is a known sensitiser during woodworking (dust exposure),
    but once finished with a food-safe oil or wax, the surface is generally considered safe for food contact.
